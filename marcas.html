<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Freework - Portal Corporativo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* Bloqueo estricto y protección de contenido */
        body, html { 
            font-family: 'Inter', sans-serif; 
            background-color: transparent; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; overflow: hidden;
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; 
            -webkit-touch-callout: none;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        
        /* Nuevo efecto Ripple (Onda táctil) */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-anim 0.6s linear;
            background-color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 10;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        .no-scrollbar { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        
        /* Animaciones Modal */
        .modal-enter { opacity: 1 !important; pointer-events: auto !important; }
        .modal-enter .modal-content { transform: scale(1) translateY(0) !important; opacity: 1 !important; }
        
        .iframe-container {
            -webkit-overflow-scrolling: touch;
            overflow: hidden;
            background-color: #ffffff;
            width: 100%; height: 100%;
        }

        .fullscreen-iframe {
            width: 100%; height: 100%; border: none;
            overflow: auto !important; -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="select-none bg-slate-50" oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;" ondragstart="return false;">

    <div class="w-full h-full flex flex-col relative overflow-hidden">
        
        <!-- ==========================================
             ENCABEZADO CORPORATIVO (DARK SLATE)
             ========================================== -->
        <header class="relative z-10 bg-slate-900 pt-8 pb-24 px-4 sm:px-6 md:px-8 rounded-b-[2.5rem] md:rounded-b-[3rem] shadow-2xl shrink-0 animate-fade-in">
            
            <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 24px 24px;"></div>

            <!-- Navegación Superior -->
            <div class="flex items-center justify-between mb-8 relative z-10">
                <div class="flex items-center gap-3">
                   <a href="hub.html" target="_top" class="w-10 h-10 rounded-xl bg-white/10 border border-white/10 flex items-center justify-center text-white hover:bg-white/20 transition-all backdrop-blur-md">
              <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </a>
                    </a>
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">Portal Comercial</span>
                        <h2 class="text-xl font-black text-white tracking-tight leading-none">FREEWORK<span class="text-emerald-400">.</span></h2>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <div class="px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/20 shadow-sm hidden sm:flex items-center gap-2 backdrop-blur-md">
                        <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse shadow-[0_0_8px_rgba(52,211,153,0.6)]"></span>
                        <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">En Línea</span>
                    </div>
                    <button class="w-10 h-10 rounded-xl bg-white/10 border border-white/10 flex items-center justify-center text-white hover:bg-white/20 transition-all relative backdrop-blur-md">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-slate-900"></span>
                    </button>
                </div>
            </div>

            <!-- Dashboard Ejecutivo -->
            <div class="relative z-10">
                <h1 id="user-greeting" class="text-3xl md:text-4xl font-extrabold text-white tracking-tight mb-1">
                    Hola, Ejecutivo
                </h1>
                <p class="text-sm text-slate-400 font-medium tracking-wide mb-6">
                    Resumen de tu jornada comercial
                </p>
                
                <!-- CONTENEDOR DINÁMICO DEL BANNER -->
                <div id="highlight-container"></div>

            </div>
        </header>

        <!-- ==========================================
             ÁREA DE CONTENIDO
             ========================================== -->
        <!-- Restauramos el padding a pb-12 para que no quede espacio vacío abajo -->
        <main class="flex-1 overflow-y-auto no-scrollbar relative z-20 px-4 sm:px-6 md:px-8 -mt-16 pb-32">
            <div class="max-w-4xl mx-auto mb-4 px-2 flex justify-between items-end">
                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Marcas Disponibles</h3>
            </div>
            
            <div id="brands-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-4xl mx-auto w-full"></div>
        </main>
    </div>

    <!-- ==========================================
         MODAL PANTALLA COMPLETA
         ========================================== -->
    <div id="app-modal" class="fixed inset-0 z-50 bg-slate-900 opacity-0 pointer-events-none transition-opacity duration-300 flex items-center justify-center p-0">
        <div class="modal-content relative w-full h-full bg-slate-50 overflow-hidden flex flex-col transform scale-95 translate-y-4 opacity-0 transition-all duration-300">
            
            <div class="px-4 py-3 bg-white flex justify-between items-center border-b border-slate-200 shrink-0 relative z-40 shadow-sm">
                <div class="flex items-center gap-3">
                    <div id="modal-icon-bg" class="w-9 h-9 rounded-xl bg-gradient-to-br from-gray-500 to-gray-700 flex items-center justify-center text-white shadow-sm border border-slate-100">
                        <i id="modal-icon" data-lucide="layout-template" class="w-4 h-4"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Plataforma</span>
                        <h3 id="modal-title" class="font-bold text-slate-900 text-sm leading-tight">Cargando...</h3>
                    </div>
                </div>
                
                <button onclick="AppController.closeModal()" class="w-10 h-10 rounded-xl bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-slate-200 hover:text-slate-900 transition-all">
                    <span class="text-xs font-bold mr-1 hidden sm:block">Cerrar</span>
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="iframe-container flex-1 relative w-full h-full bg-slate-50">
                <div id="modal-loader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-20">
                    <div id="loader-icon-bg" class="w-16 h-16 rounded-2xl bg-gradient-to-br from-gray-500 to-gray-700 flex items-center justify-center text-white shadow-lg mb-4 border-4 border-white">
                        <i id="loader-icon" data-lucide="loader-2" class="w-8 h-8 animate-spin"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-800 mb-1">Estableciendo conexión</span>
                    <span class="text-xs text-slate-500 font-medium" id="loader-brand">Conectando con el servidor...</span>
                </div>
                
                <iframe id="modal-iframe" 
                        src="" 
                        class="fullscreen-iframe"
                        sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
                        onload="this.style.opacity=1; document.getElementById('modal-loader').style.display='none';"
                        style="opacity: 0; transition: opacity 0.5s;">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // ⚙️ CONFIGURACIÓN PRINCIPAL (FÁCIL DE EDITAR)
        // =========================================================================
        const AppConfig = {
            
            // 1. CAMPAÑA DESTACADA (Banner superior)
            // Para editarlo solo cambia los textos entre las comillas.
            destacado: {
                mostrar: true,       // Cambia a 'false' si quieres ocultar el banner este mes
                tema: 'wom',         // Escribe: 'wom', 'entel', 'movistar' o 'claro' para cambiar el color y el icono mágicamente
                marca: 'WOM',
                plan: 'WOM Fibra 600',
                descripcion: 'El plan de solo fibra más vendido',
                precio: '$13.990',
                etiqueta: 'Mejor Precio',
                tipo: 'Solo Fibra',
                url: 'wom.html'
            },

            // 2. LISTA DE MARCAS (Tarjetas inferiores)
           marcas: [
            { id: 'movistar', name: 'Movistar', color: 'from-emerald-500 to-teal-600',   icon: 'wifi',       url: 'movistar.html', badge: '' },
           { id: 'entel',    name: 'Entel',    color: 'from-blue-600 to-blue-800',       icon: 'smartphone', url: 'entel.html',    badge: '' },
            { id: 'wom',      name: 'WOM',      color: 'from-purple-600 to-fuchsia-600',  icon: 'zap',        url: 'wom.html',      badge: '' },
            { id: 'claro',    name: 'Claro',    color: 'from-red-500 to-red-700',         icon: 'globe',      url: 'claro.html',    badge: '' }
           ]
        };

        // =========================================================================
        // 🧠 LÓGICA DEL SISTEMA (No necesitas tocar esto)
        // =========================================================================
        const AppController = {
            init() {
                this.loadUserName(); 
                this.renderHighlightBanner();
                this.renderBrandCards();
                this.setupRipples(); // Inicializar el efecto de toque
                lucide.createIcons(); 
            },

            loadUserName() {
                try {
                    const savedUser = localStorage.getItem('freework_user');
                    if (savedUser) {
                        const user = JSON.parse(savedUser);
                        if (user && user.name) {
                            document.getElementById('user-greeting').innerText = `Hola, ${user.name.split(' ')[0]}`;
                        }
                    }
                } catch (e) { console.log("Modo visualización"); }
            },

            renderHighlightBanner() {
                const container = document.getElementById('highlight-container');
                const d = AppConfig.destacado;
                
                if (!d || !d.mostrar) {
                    container.innerHTML = '';
                    return;
                }

                // Paletas de color automáticas según la marca elegida
                const temas = {
                    wom: {
                        bg: 'from-purple-900/40 to-fuchsia-900/20', border: 'border-fuchsia-500/30', hoverBorder: 'hover:border-fuchsia-400/50',
                        shadow: 'hover:shadow-[0_0_30px_rgba(217,70,239,0.15)]', glow: 'bg-fuchsia-500/20', hoverGlow: 'group-hover:bg-fuchsia-500/30',
                        line: 'from-purple-500 to-fuchsia-500', iconBg: 'from-purple-500 to-fuchsia-600', iconShadow: 'shadow-fuchsia-500/20',
                        icon: 'zap', textColor: 'text-fuchsia-300', modalColor: 'from-purple-600 to-fuchsia-600'
                    },
                    entel: {
                        bg: 'from-blue-900/40 to-blue-800/20', border: 'border-blue-500/30', hoverBorder: 'hover:border-blue-400/50',
                        shadow: 'hover:shadow-[0_0_30px_rgba(59,130,246,0.15)]', glow: 'bg-blue-500/20', hoverGlow: 'group-hover:bg-blue-500/30',
                        line: 'from-blue-600 to-blue-400', iconBg: 'from-blue-600 to-blue-500', iconShadow: 'shadow-blue-500/20',
                        icon: 'smartphone', textColor: 'text-blue-300', modalColor: 'from-blue-600 to-blue-800'
                    },
                    movistar: {
                        bg: 'from-emerald-900/40 to-teal-900/20', border: 'border-emerald-500/30', hoverBorder: 'hover:border-emerald-400/50',
                        shadow: 'hover:shadow-[0_0_30px_rgba(16,185,129,0.15)]', glow: 'bg-emerald-500/20', hoverGlow: 'group-hover:bg-emerald-500/30',
                        line: 'from-emerald-500 to-teal-500', iconBg: 'from-emerald-500 to-teal-400', iconShadow: 'shadow-emerald-500/20',
                        icon: 'wifi', textColor: 'text-emerald-300', modalColor: 'from-emerald-500 to-teal-600'
                    },
                    claro: {
                        bg: 'from-red-900/40 to-red-800/20', border: 'border-red-500/30', hoverBorder: 'hover:border-red-400/50',
                        shadow: 'hover:shadow-[0_0_30px_rgba(239,68,68,0.15)]', glow: 'bg-red-500/20', hoverGlow: 'group-hover:bg-red-500/30',
                        line: 'from-red-600 to-red-400', iconBg: 'from-red-600 to-red-500', iconShadow: 'shadow-red-500/20',
                        icon: 'globe', textColor: 'text-red-300', modalColor: 'from-red-500 to-red-700'
                    }
                };

                const t = temas[d.tema] || temas.wom;

                container.innerHTML = `
                    <div onclick="AppController.openModal('${d.url}', '${d.marca}', '${t.modalColor}', '${t.icon}')" 
                         class="group relative overflow-hidden rounded-2xl bg-gradient-to-r ${t.bg} border ${t.border} p-4 sm:p-5 backdrop-blur-md cursor-pointer ${t.hoverBorder} ${t.shadow} transition-all duration-300">
                        
                        <div class="absolute -top-12 -right-10 w-40 h-40 ${t.glow} rounded-full blur-3xl ${t.hoverGlow} transition-all duration-500"></div>
                        <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r ${t.line} opacity-50"></div>

                        <div class="relative z-10 flex items-center justify-between">
                            <div class="flex items-center gap-3 sm:gap-4">
                                <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-gradient-to-br ${t.iconBg} flex items-center justify-center text-white shadow-lg ${t.iconShadow} group-hover:scale-105 transition-transform duration-300 shrink-0">
                                    <i data-lucide="${t.icon}" class="w-5 h-5 sm:w-6 sm:h-6 fill-white/20"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="px-2 py-0.5 rounded-md bg-emerald-500/20 text-emerald-300 text-[9px] font-black uppercase tracking-widest border border-emerald-500/20 flex items-center gap-1">
                                            <span class="w-1 h-1 rounded-full bg-emerald-400 animate-pulse"></span>
                                            ${d.etiqueta}
                                        </span>
                                    </div>
                                    <h3 class="text-white font-bold text-sm sm:text-lg leading-tight">${d.plan}</h3>
                                    <p class="text-slate-400 text-[10px] sm:text-xs mt-0.5 font-medium hidden sm:block">${d.descripcion}</p>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-3 pl-2 sm:pl-0">
                                <div class="text-right">
                                    <span class="block text-[9px] ${t.textColor} font-bold uppercase tracking-widest">${d.tipo}</span>
                                    <span class="text-base sm:text-xl font-black text-white">${d.precio}</span>
                                </div>
                                <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-white/10 flex items-center justify-center text-white group-hover:bg-white/20 transition-all duration-300 shrink-0">
                                    <i data-lucide="arrow-right" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderBrandCards() {
                const grid = document.getElementById('brands-grid');
                grid.innerHTML = AppConfig.marcas.map((marca, index) => `
                    <button ${marca.url !== '#' ? `onclick="AppController.openModal('${marca.url}', '${marca.name}', '${marca.color}', '${marca.icon}')"` : `onclick="event.preventDefault();"`} 
                         class="block w-full text-left group relative bg-white p-5 rounded-[1.5rem] cursor-pointer overflow-hidden border border-slate-200 shadow-[0_4px_20px_rgba(0,0,0,0.04)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.08)] hover:-translate-y-1 transition-all duration-300 animate-fade-in-up" 
                         style="animation-delay: ${index * 100}ms">
                        
                        ${marca.badge ? `
                        <div class="absolute top-4 right-4 px-2.5 py-1 bg-emerald-50 border border-emerald-200 rounded-md z-20 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span class="text-[9px] font-bold text-emerald-700 uppercase tracking-wider">${marca.badge}</span>
                        </div>
                        ` : ''}

                        <div class="flex items-center justify-between relative z-10">
                            <div class="flex items-center gap-4">
                                <div class="w-14 h-14 rounded-2xl bg-gradient-to-br ${marca.color} flex items-center justify-center text-white shadow-inner group-hover:scale-105 transition-transform duration-300">
                                    <i data-lucide="${marca.icon}" class="w-7 h-7 drop-shadow-md"></i>
                                </div>
                                <div class="flex flex-col">
                                    <h3 class="text-xl font-extrabold text-slate-800 leading-tight group-hover:text-slate-900 transition-colors">${marca.name}</h3>
                                    <p class="text-[11px] text-slate-500 font-semibold mt-0.5">Ingresar Solicitud</p>
                                </div>
                            </div>
                            
                            <div class="w-10 h-10 rounded-xl bg-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 group-hover:bg-slate-900 group-hover:text-white group-hover:border-slate-900 transition-all duration-300 ${marca.badge ? 'mt-6' : ''}">
                                <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </div>
                        </div>
                    </button>
                `).join('');
            },

            openModal(url, title, colorClass, iconName) {
                const modal = document.getElementById('app-modal');
                const iframe = document.getElementById('modal-iframe');
                const loader = document.getElementById('modal-loader');
                
                document.getElementById('modal-title').innerText = title;
                
                const iconBg = document.getElementById('modal-icon-bg');
                iconBg.className = `w-9 h-9 rounded-xl bg-gradient-to-br ${colorClass} flex items-center justify-center text-white shadow-sm border border-slate-100`;
                iconBg.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4"></i>`;
                
                const loaderIconBg = document.getElementById('loader-icon-bg');
                loaderIconBg.className = `w-16 h-16 rounded-2xl bg-gradient-to-br ${colorClass} flex items-center justify-center text-white shadow-lg mb-4 border-4 border-white`;
                loaderIconBg.innerHTML = `<i data-lucide="${iconName}" class="w-8 h-8"></i>`;
                
                document.getElementById('loader-brand').innerText = "Abriendo entorno de " + title;
                
                lucide.createIcons();

                iframe.style.opacity = '0';
                loader.style.display = 'flex';
                iframe.src = url;

                modal.classList.add('modal-enter');
            },

            closeModal() {
                const modal = document.getElementById('app-modal');
                const iframe = document.getElementById('modal-iframe');
                
                modal.classList.remove('modal-enter');
                
                setTimeout(() => {
                    iframe.src = '';
                    iframe.style.opacity = '0';
                }, 300);
            },

            // NUEVA FUNCIÓN: Efecto de onda al tocar las tarjetas
            setupRipples() {
                document.addEventListener('click', function(e) {
                    const target = e.target.closest('.group');
                    if (!target) return;

                    const circle = document.createElement('span');
                    const diameter = Math.max(target.clientWidth, target.clientHeight);
                    const radius = diameter / 2;

                    const rect = target.getBoundingClientRect();
                    
                    circle.style.width = circle.style.height = `${diameter}px`;
                    circle.style.left = `${e.clientX - rect.left - radius}px`;
                    circle.style.top = `${e.clientY - rect.top - radius}px`;
                    circle.classList.add('ripple');

                    // Remover ondas anteriores para evitar saturación
                    const ripple = target.getElementsByClassName('ripple')[0];
                    if (ripple) { ripple.remove(); }

                    target.appendChild(circle);
                });
            }
        };

        window.addEventListener('DOMContentLoaded', () => { AppController.init(); });
    </script>
</body>
</html>
