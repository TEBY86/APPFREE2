<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Freework - Nuevo Socio Comercial</title>
    
    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fuente Unificada -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           VARIABLES ELITE OBSIDIAN
           ============================================================ */
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            
            --glass-bg: rgba(5, 7, 12, 0.75); 
            --glass-border: rgba(255, 255, 255, 0.06);
            --active-glow: rgba(168, 85, 247, 0.8);
            --spring-curve: cubic-bezier(0.4, 1.2, 0.5, 1);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; /* Negro OLED puro */
            margin: 0; padding: 0; 
            height: 100dvh; min-height: 100dvh; 
            display: flex; flex-direction: column; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
            touch-action: manipulation;
        }
        
        /* ── ANIMACIONES ELITE ── */
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .animate-fade-in-up { animation: fadeInUp 0.8s var(--spring-curve) forwards; opacity: 0; }
        
        /* ── FONDOS TIPO RADAR / MATRIX ── */
        .bg-noise { 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E"); 
        }
        
        .bg-chart {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' viewBox='0 0 1000 1000' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M -100 800 C 200 800, 300 500, 500 550 S 700 200, 1100 100' fill='none' stroke='rgba(168, 85, 247, 0.05)' stroke-width='4'/%3E%3C/svg%3E");
            background-size: cover;
            background-position: center;
            pointer-events: none;
            z-index: 0;
        }

        .grid-lines {
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 0%, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 0%, transparent 80%);
        }
        
        .brand-gradient { background: linear-gradient(135deg, #a855f7 0%, #d946ef 100%); }
        
        /* ── FIBRA ÓPTICA (NEÓN SUTIL) ── */
        @keyframes fiber-light {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(300%); }
        }
        .animate-fiber { animation: fiber-light 3s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; }
        .animate-fiber-slow { animation: fiber-light 5s cubic-bezier(0.4, 0.0, 0.2, 1) infinite 1.5s; }

        /* ── CRISTALERÍA ELITE (Componentes) ── */
        .obsidian-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(48px) saturate(180%);
            -webkit-backdrop-filter: blur(48px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 40px 80px -16px rgba(0, 0, 0, 1), 
                inset 0 1px 1px rgba(255, 255, 255, 0.08),
                inset 0 -1px 2px rgba(0, 0, 0, 0.8);
        }

        /* ── INPUTS PREMIUM (Fusión de bordes) ── */
        .glass-input-wrapper {
            background: rgba(10, 14, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .glass-input-wrapper:focus-within {
            background: rgba(15, 20, 35, 0.8);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 0 20px rgba(168, 85, 247, 0.1);
        }
        .glass-input-wrapper input {
            background: transparent; border: none; outline: none; width: 100%;
            color: #ffffff; font-weight: 500; font-size: 0.875rem;
        }
        .glass-input-wrapper input::placeholder { color: #475569; }

        .no-scrollbar::-webkit-scrollbar { display: none !important; }
        .no-scrollbar { -ms-overflow-style: none !important; scrollbar-width: none !important; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 20px); }

        /* ── FIX INPUTS IOS/ANDROID ── */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0a0e17 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>

    <div class="w-full h-full flex flex-col relative overflow-hidden transition-all duration-300">
        
        <!-- ── FONDO DE CAPAS (Profundidad OLED) ── -->
        <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
            <div class="bg-chart"></div>
            <div class="absolute top-[-10%] -left-[20%] w-[600px] h-[600px] bg-violet-600/10 rounded-full blur-[140px]"></div>
            <div class="absolute bottom-[-10%] -right-[20%] w-[600px] h-[600px] bg-fuchsia-600/5 rounded-full blur-[140px]"></div>
            <div class="absolute inset-0 bg-noise opacity-40"></div>
            <div class="absolute inset-0 grid-lines"></div>
            
            <!-- Fibras Ópticas de Datos -->
            <div class="absolute top-[35%] -left-[10%] w-[120%] h-[1px] bg-violet-500/10 rotate-[-12deg] overflow-hidden opacity-80">
                <div class="w-1/2 h-full bg-gradient-to-r from-transparent via-fuchsia-400 to-transparent shadow-[0_0_20px_rgba(217,70,239,0.8)] animate-fiber"></div>
            </div>
            <div class="absolute top-[65%] -left-[10%] w-[120%] h-[1px] bg-fuchsia-500/10 rotate-[8deg] overflow-hidden opacity-60">
                <div class="w-1/2 h-full bg-gradient-to-r from-transparent via-violet-400 to-transparent shadow-[0_0_20px_rgba(168,85,247,0.8)] animate-fiber-slow"></div>
            </div>
        </div>
            
        <div class="relative z-10 w-full max-w-sm mx-auto px-6 flex flex-col h-full pt-[calc(var(--safe-top)+2rem)]">
            
            <!-- LOGO & TÍTULO (ENFOQUE AGRESIVO/WOM) -->
            <div class="text-center mb-6 shrink-0 animate-fade-in-up">
                
                <div class="inline-flex items-center gap-2.5 px-4 py-1.5 rounded-full obsidian-glass mb-4 shadow-sm">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-violet-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-violet-500"></span>
                    </span>
                    <span class="text-[9px] font-black text-slate-300 uppercase tracking-[0.2em]">Únete a la Red Elite</span>
                </div>

                <div class="flex flex-col items-center justify-center gap-2 mb-2">
                    <!-- LOGO DINÁMICO MULTIFORMATO -->
                    <picture class="block">
                        <source srcset="imagenes/logo.svg" type="image/svg+xml">
                        <source srcset="imagenes/logo.webp" type="image/webp">
                        <img src="imagenes/logo.png" alt="Logo Freework" class="h-10 w-auto mx-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] transition-transform duration-500 hover:scale-105">
                    </picture>
                    
                    <h1 class="text-[2.5rem] font-black text-white tracking-tighter leading-none">FREEWORK</h1>
                </div>
                
                <!-- FRASE POTENTE -->
                <p class="text-[10px] text-fuchsia-400 font-black uppercase tracking-[0.2em] drop-shadow-[0_0_10px_rgba(217,70,239,0.5)] mt-3">AQUÍ NO SE LLORA, SE FACTURA</p>
            </div>

            <!-- FORMULARIO ELITE (ESTILO DASHBOARD SCROLLABLE) -->
            <div class="w-full flex-1 overflow-y-auto no-scrollbar pb-10 safe-pb space-y-3.5 animate-fade-in-up" style="animation-delay: 0.1s;">
                
                <div class="glass-input-wrapper flex items-center px-5 h-[3.5rem] group">
                    <i data-lucide="user" class="text-slate-500 w-5 h-5 mr-4 group-focus-within:text-violet-400 transition-colors shrink-0"></i>
                    <input type="text" id="reg-nombre" placeholder="Identidad del Socio" class="flex-1 min-w-0" autocomplete="off"/>
                </div>
                
                <div class="glass-input-wrapper flex items-center px-5 h-[3.5rem] group">
                    <i data-lucide="mail" class="text-slate-500 w-5 h-5 mr-4 group-focus-within:text-violet-400 transition-colors shrink-0"></i>
                    <input type="email" id="reg-email" placeholder="Correo Operativo" class="flex-1 min-w-0" autocapitalize="none" autocomplete="off"/>
                </div>
                
                <div class="glass-input-wrapper flex items-center px-5 h-[3.5rem] group">
                    <i data-lucide="smartphone" class="text-slate-500 w-5 h-5 mr-4 group-focus-within:text-violet-400 transition-colors shrink-0"></i>
                    <input type="tel" inputmode="tel" id="reg-tel" placeholder="Línea Directa (WhatsApp)" class="flex-1 min-w-0" autocomplete="off"/>
                </div>
                
                <div class="glass-input-wrapper flex items-center px-5 h-[3.5rem] group">
                    <i data-lucide="key" class="text-slate-500 w-5 h-5 mr-4 group-focus-within:text-violet-400 transition-colors shrink-0"></i>
                    <input type="password" id="reg-pass" placeholder="Clave de Encriptación" class="flex-1 min-w-0"/>
                </div>
                
                <div class="glass-input-wrapper flex items-center px-5 h-[3.5rem] group">
                    <i data-lucide="check-circle" class="text-slate-500 w-5 h-5 mr-4 group-focus-within:text-violet-400 transition-colors shrink-0"></i>
                    <input type="password" id="reg-pass2" placeholder="Reafirmar Clave" class="flex-1 min-w-0"/>
                </div>
                
                <button onclick="handleRegister()" id="btn-register" class="w-full h-14 mt-4 brand-gradient rounded-2xl text-white font-black text-[11px] uppercase tracking-[0.2em] shadow-[0_15px_35px_-10px_rgba(168,85,247,0.6)] active:scale-[0.97] transition-all flex items-center justify-center gap-3 border border-white/20">
                    <i data-lucide="flame" class="w-4 h-4"></i>
                    Activar Arsenal
                </button>
                
                <!-- ENLACE NATIVO AL LOGIN.HTML -->
                <div class="text-center mt-6 pt-2 pb-8 flex flex-col items-center gap-2">
                    <button onclick="redirectUrl('login.html')" class="text-[10px] text-slate-500 hover:text-violet-400 uppercase tracking-wider transition-colors flex items-center gap-2 active:scale-95">
                        <i data-lucide="arrow-left" class="w-4 h-4"></i>
                        Si ya eres socio, <span class="text-white font-black">entra a facturar</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL FEEDBACK (OBSIDIAN & ACTITUD WOM) -->
    <div id="feedbackModal" class="fixed inset-0 z-[600] flex items-center justify-center p-6 bg-black/80 backdrop-blur-xl hidden opacity-0 transition-opacity duration-300">
        <div class="obsidian-glass w-full max-w-sm rounded-[2.5rem] p-8 flex flex-col items-center text-center transform scale-95 transition-transform duration-300 relative overflow-hidden" id="feedbackModalContent">
            
            <div id="fbIconContainer" class="w-16 h-16 rounded-2xl flex items-center justify-center mb-6 border border-white/10 bg-white/5 shadow-inner">
                <i id="fbIcon" data-lucide="info" class="w-8 h-8 text-slate-300"></i>
            </div>
            
            <h3 id="fbTitle" class="text-2xl font-black text-white mb-2 uppercase tracking-tight italic">Título</h3>
            <p id="fbMsg" class="text-slate-400 text-[13px] mb-8 leading-relaxed font-semibold">Mensaje</p>
            
            <button id="fbBtn" class="w-full h-14 rounded-2xl bg-white/10 border border-white/10 font-black text-white text-[11px] uppercase tracking-widest active:scale-95 transition-all hover:bg-white/20">
                Botón Principal
            </button>
            <button id="fbBtnSec" class="w-full h-12 mt-3 bg-transparent font-bold text-slate-500 text-[10px] uppercase tracking-widest transition-colors hover:text-white relative z-10" style="display:none;">
                Botón Secundario
            </button>
        </div>
    </div>

    <script>
        const EXTERNAL_URLS = { 
            defaultScript: "https://script.google.com/macros/s/AKfycbzUn0OHXXwbUX9QHXh2E0YUE9BYhKPU2psJ_lQ-OwDAfu7Cznxu01CIu9XgMA5GGdVI/exec" 
        };
        
        const KEY_BIO = 'fw_bio_enabled';

        const apiService = {
            register: async (nombre, email, password, telefono) => {
                try {
                    const res = await fetch(EXTERNAL_URLS.defaultScript, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                        body: JSON.stringify({ action: 'register', email, password, nombre, telefono }) 
                    });
                    return await res.json();
                } catch (error) { 
                    return { success: false, message: "Error de conexión con la base central." }; 
                }
            }
        };

        // ═══════════════════════════════════════════════════
        //  LÓGICA BIOMÉTRICA NATIVA (INTACTA)
        // ═══════════════════════════════════════════════════
        function getBioPlugin() {
            if (window.NativeBiometric) return window.NativeBiometric;
            if (window.Capacitor && window.Capacitor.Plugins.NativeBiometric) return window.Capacitor.Plugins.NativeBiometric;
            return null;
        }

        async function offerBiometric(email, pass) {
            const plugin = getBioPlugin();
            if (!plugin) {
                // Si está en web normal, muestra mensaje agresivo corporativo
                showFeedback('success', '¡Adentro!', 'Tu armería está preparada, Socio. Entra al dashboard y empieza a facturar fuerte.', 'Ir a Iniciar Sesión', () => { 
                    redirectUrl('login.html'); 
                });
                return;
            }

            // Si está en la app móvil, ofrece guardar la biometría con actitud
            showFeedback(
                'bio',
                '¡Alianza Forjada!',
                'Tu ecosistema está listo. ¿Quieres enlazar tu Huella o Face ID para entrar como un jefe la próxima vez?',
                'Vincular Biometría',
                async () => {
                    try {
                        await plugin.setCredentials({ server: 'freework_app', username: email, password: pass });
                        localStorage.setItem(KEY_BIO, 'true');
                    } catch(e) { console.error("Error guardando biometría:", e); }
                    redirectUrl('login.html');
                },
                'Hoy no, gracias',
                () => { redirectUrl('login.html'); }
            );
        }

        // Función de Feedback compartida con el Login (Tonos corporativos Fucsia/Violeta/Rose)
        function showFeedback(type, title, msg, btnTxt, cb, secTxt, secCb) {
            const modal   = document.getElementById('feedbackModal');
            const content = document.getElementById('feedbackModalContent');
            const iconCon = document.getElementById('fbIconContainer');
            const icon    = document.getElementById('fbIcon');
            const btnPri  = document.getElementById('fbBtn');
            const btnSec  = document.getElementById('fbBtnSec');

            document.getElementById('fbTitle').textContent = title;
            document.getElementById('fbMsg').textContent   = msg;

            if(type === 'error') {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-rose-500/10 border-rose-500/20 text-rose-500 shadow-[0_0_20px_rgba(244,63,94,0.15)]';
                icon.setAttribute('data-lucide', 'alert-triangle');
                btnPri.className = 'w-full h-14 rounded-2xl font-black text-white text-[11px] uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-rose-500/20 bg-rose-600 shadow-[0_0_15px_rgba(225,29,72,0.4)]';
            } else if (type === 'success') {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-fuchsia-500/10 border-fuchsia-500/20 text-fuchsia-400 shadow-[0_0_20px_rgba(217,70,239,0.15)]';
                icon.setAttribute('data-lucide', 'check-circle-2');
                btnPri.className = 'w-full h-14 rounded-2xl font-black text-white text-[11px] uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-white/20 brand-gradient shadow-[0_0_15px_rgba(217,70,239,0.4)]';
            } else if (type === 'bio') {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border bg-violet-500/10 border-violet-500/20 text-violet-400 shadow-[0_0_20px_rgba(139,92,246,0.15)]';
                icon.setAttribute('data-lucide', 'fingerprint');
                btnPri.className = 'w-full h-14 rounded-2xl font-black text-white text-[11px] uppercase tracking-widest transition-transform active:scale-95 relative z-10 border border-white/20 brand-gradient shadow-[0_0_15px_rgba(168,85,247,0.4)]';
            } else {
                iconCon.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mb-6 relative z-10 border border-white/10 bg-white/5 shadow-inner';
                icon.setAttribute('data-lucide', 'info');
                btnPri.className = 'w-full h-14 rounded-2xl bg-white/10 border border-white/10 font-black text-white text-[11px] uppercase tracking-widest active:scale-95 transition-all hover:bg-white/20';
            }

            btnPri.textContent = btnTxt || 'Entendido';
            btnPri.onclick = () => { closeFeedbackModal(); if(cb) cb(); };

            if (secTxt) {
                btnSec.textContent = secTxt;
                btnSec.style.display = '';
                btnSec.onclick = () => { closeFeedbackModal(); if(secCb) secCb(); };
            } else {
                btnSec.style.display = 'none';
            }

            modal.classList.remove('hidden');
            lucide.createIcons({ root: modal });
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeFeedbackModal() {
            const modal   = document.getElementById('feedbackModal');
            const content = document.getElementById('feedbackModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function setAuthLoading(btnId, text, isLoading) {
            const btn = document.getElementById(btnId); 
            btn.disabled = isLoading;
            btn.innerHTML = isLoading ? `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Procesando...` : `<i data-lucide="flame" class="w-4 h-4"></i> ${text}`; 
            lucide.createIcons({root: btn});
        }

        function redirectUrl(url) {
            try { 
                if (window.top !== window.self) { window.top.location.href = url; } 
                else { window.location.href = url; } 
            } catch (error) { 
                window.location.href = url;
            }
        }

        async function handleRegister() {
            const n = document.getElementById('reg-nombre').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const t = document.getElementById('reg-tel').value.trim();
            const p1 = document.getElementById('reg-pass').value.trim();
            const p2 = document.getElementById('reg-pass2').value.trim();
            
            document.activeElement.blur();
            
            if(!n || !e || !t || !p1) {
                return showFeedback('error', 'Faltan Datos', 'Ey, Recluta. Faltan datos en tu expediente. Llena todo para empezar a facturar.', 'Completar');
            }
            if(p1 !== p2) {
                return showFeedback('error', 'Fuego Amigo', 'Las claves no cuadran. Asegúrate de escribir exactamente lo mismo.', 'Corregir');
            }
            
            setAuthLoading('btn-register', 'Activar Arsenal', true);
            
            try {
                const res = await apiService.register(n, e, p1, t);
                if(res.success) {
                    await offerBiometric(e, p1);
                } else { 
                    showFeedback('error', 'Registro Rechazado', res.message || 'La base no aceptó el registro. Intenta con otro correo.', 'Entendido'); 
                }
            } catch(er) { 
                showFeedback('error', 'Caída de Señal', 'Perdimos conexión con el cuartel central. Busca red e intenta de nuevo.', 'Entendido'); 
            }
            
            setAuthLoading('btn-register', 'Activar Arsenal', false);
        }

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
