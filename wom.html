<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOM Wizard</title>
    <!-- Librería de Iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* =================================================================================
           🎨 SECCIÓN 1: CONFIGURACIÓN VISUAL (COLORES Y ESTILOS)
           ================================================================================= */
        :root {
            /* Color Principal (WOM: Fucsia/Morado) */
            --primary: #E6007A; 
            /* Degradado del Encabezado (Morado a Fucsia) */
            --gradient: linear-gradient(135deg, #9333ea, #db2777); 
            /* Fondo de la página */
            --bg-color: #fdf4ff; 
            /* Colores de Texto */
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
        }

        /* --- Estilos Base --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
         
      body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            padding-bottom: 225px; /* <--- AUMENTA ESTE NÚMERO SI EL FOOTER TAPA EL FORMULARIO AL BAJAR DEL TODO */
            color: var(--text-main);
        }
        /* --- Header --- */
        .header {
            background: var(--gradient);
            padding: 40px 20px 60px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            color: white;
            position: relative;
            box-shadow: 0 10px 30px rgba(147, 51, 234, 0.3);
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.1);
            color: white; width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; backdrop-filter: blur(5px);
        }

        .header-content { text-align: center; margin-top: 10px; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; }
        .tag { 
            background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; 
            font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            margin-top: 8px; display: inline-block; backdrop-filter: blur(5px);
        }

        /* --- Contenedor --- */
        .container {
            max-width: 500px; margin: -40px auto 0; padding: 0 20px;
            position: relative; z-index: 10;
        }

        /* --- Tarjetas --- */
        .section-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05);
            position: relative;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .floating-icon {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 44px; height: 44px;
            background: var(--gradient);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white;
            box-shadow: 0 8px 15px rgba(147, 51, 234, 0.3);
            border: 4px solid var(--bg-color);
        }

        .section-title {
            text-align: center; font-size: 12px; font-weight: 800; 
            text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px;
            margin-top: 10px; margin-bottom: 20px;
        }

        /* --- Inputs --- */
        select, input, textarea {
            width: 100%; padding: 16px;
            background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-size: 14px; font-weight: 600; color: var(--text-main);
            margin-bottom: 12px;
            transition: all 0.3s;
            appearance: none;
        }
        select:focus, input:focus, textarea:focus {
            background: white; border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(230, 0, 122, 0.1);
        }
        input:read-only { opacity: 0.8; cursor: not-allowed; }

        /* --- Toggle Buttons --- */
        .toggle-row { display: flex; gap: 10px; }
        .toggle-btn {
            flex: 1; padding: 15px;
            background: white; border: 2px solid #f1f5f9;
            border-radius: 16px; cursor: pointer;
            text-align: center; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .toggle-btn span { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }
        .toggle-btn.active {
            border-color: var(--primary); background: #fdf4ff;
        }
        .toggle-btn.active span { color: var(--primary); }
        .toggle-btn svg { color: var(--text-muted); }
        .toggle-btn.active svg { color: var(--primary); }

        /* --- Lista Planes --- */
        .plan-item {
            border: 2px solid #f1f5f9; border-radius: 20px;
            padding: 16px; margin-bottom: 10px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .plan-item:hover { transform: scale(1.02); }
        .plan-item.selected {
            border-color: var(--primary); background: #fdf4ff;
        }
        .plan-name { font-size: 18px; font-weight: 800; color: var(--text-main); }
        .plan-meta { font-size: 11px; font-weight: 600; color: var(--text-muted); }
        .plan-price { font-size: 18px; font-weight: 900; color: var(--primary); }
        .plan-normal { font-size: 10px; text-decoration: line-through; color: #cbd5e1; display: block; text-align: right; }

        /* --- Controles --- */
        .control-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; background: #f8fafc; border-radius: 16px; margin-bottom: 10px; border: 1px solid #f1f5f9;
        }
        .control-info span { display: block; }
        .control-title { font-size: 13px; font-weight: 700; color: var(--text-main); }
        .control-price { font-size: 10px; font-weight: 600; color: var(--text-muted); background: #e2e8f0; padding: 2px 6px; border-radius: 6px; display: inline-block; margin-top: 2px; }
        
        .counter { display: flex; align-items: center; gap: 10px; background: white; padding: 4px 8px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .btn-count {
            width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: 900; display: flex; align-items: center; justify-content: center;
        }
        .btn-minus { background: #f1f5f9; color: var(--text-muted); }
        .btn-plus { background: var(--primary); color: white; }
        .count-val { font-weight: 800; width: 20px; text-align: center; }

        .smart-paste-btn {
            position: absolute; right: 20px; top: 20px;
            background: #eff6ff; color: #2563eb; border: none;
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.2s;
        }
        .smart-paste-btn:active { transform: scale(0.9); }

        /* --- Footer --- */
      /* --- Footer --- */
        .footer {
            position: fixed; 
            bottom: 85px; /* <--- CAMBIA ESTE NÚMERO PARA SUBIR O BAJAR LA BARRA */
            left: 0; right: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid #e2e8f0;
            padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }
        .total-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .total-amount { font-size: 28px; font-weight: 900; color: var(--primary); line-height: 1; }
        
        .btn-submit {
            background: var(--gradient); border: none; color: white;
            padding: 14px 28px; border-radius: 16px;
            font-size: 14px; font-weight: 800; letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(147, 51, 234, 0.4);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: transform 0.2s;
        }
        .btn-submit:active { transform: scale(0.96); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        /* --- MODALES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(8px);
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { display: flex; opacity: 1; }

        .modal-card {
            background: white; width: 100%; max-width: 380px;
            padding: 30px; border-radius: 30px;
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.2);
            transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.open .modal-card { transform: translateY(0); }
        
        /* Iconos dinámicos del feedback */
        .icon-circle {
            width: 80px; height: 80px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin: 0 auto 20px;
        }
        .icon-success { background: #dcfce7; color: #16a34a; box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2); }
        .icon-error { background: #fee2e2; color: #dc2626; box-shadow: 0 10px 20px rgba(220, 38, 38, 0.2); }

    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <a href="marcas.html" target="_top" class="back-btn"><i data-lucide="arrow-left"></i></a>
        <div class="header-content">
            <h1>WOM Fibra</h1>
            <span class="tag">Configurador de Venta</span>
        </div>
    </div>

    <!-- Contenido -->
    <div class="container">

        <!-- 1. UBICACIÓN -->
        <div class="section-card">
            <div class="floating-icon"><i data-lucide="map-pin"></i></div>
            <div class="section-title">¿Dónde instalamos?</div>
            <select id="region" onchange="actualizarComunas()">
                <option value="">Selecciona Región</option>
                <option value="Metropolitana">Metropolitana</option>
                <option value="Valparaíso">Valparaíso</option>
                <option value="Biobío">Biobío</option>
                <option value="O'Higgins">O'Higgins</option>
            </select>
            <select id="comuna" disabled>
                <option value="">Selecciona Comuna</option>
            </select>
        </div>

        <!-- 2. SERVICIO -->
        <div class="section-card">
            <div class="floating-icon"><i data-lucide="zap"></i></div>
            <div class="section-title">Tipo de Servicio</div>
            
            <div class="toggle-row">
                <div class="toggle-btn active" id="btn-net" onclick="setTipo(false)">
                    <i data-lucide="wifi"></i>
                    <span>Solo Internet</span>
                </div>
                <div class="toggle-btn" id="btn-combo" onclick="setTipo(true)">
                    <i data-lucide="tv"></i>
                    <span>Internet + TV</span>
                </div>
            </div>
        </div>

        <!-- 3. PLANES -->
        <div class="section-card">
            <div class="floating-icon"><i data-lucide="trending-up"></i></div>
            <div class="section-title">Selecciona Plan</div>
            <div id="planes-list"></div>
        </div>

        <!-- 4. EXTRAS -->
        <div class="section-card">
            <div class="floating-icon"><i data-lucide="package"></i></div>
            <div class="section-title">Personaliza tu Pack</div>

            <!-- Selector TV -->
            <div id="tv-options" style="display: none; margin-bottom: 15px;">
                <label style="font-size:11px; font-weight:700; color:#94a3b8; display:block; margin-bottom:5px;">PLAN DE TV</label>
                <div class="toggle-row" id="tv-plans-container"></div>
            </div>

            <!-- Controles Equipos -->
            <div class="control-row">
                <div class="control-info">
                    <span class="control-title">Extensor WiFi</span>
                    <span class="control-price" id="price-ext-display"></span>
                </div>
                <div class="counter">
                    <button class="btn-count btn-minus" onclick="updateExtra('ext', -1)">-</button>
                    <span class="count-val" id="qty-ext">0</span>
                    <button class="btn-count btn-plus" onclick="updateExtra('ext', 1)">+</button>
                </div>
            </div>

            <div class="control-row" id="deco-row" style="display: none;">
                <div class="control-info">
                    <span class="control-title">Deco TV Adicional</span>
                    <span class="control-price" id="price-deco-display"></span>
                </div>
                <div class="counter">
                    <button class="btn-count btn-minus" onclick="updateExtra('deco', -1)">-</button>
                    <span class="count-val" id="qty-deco">0</span>
                    <button class="btn-count btn-plus" onclick="updateExtra('deco', 1)">+</button>
                </div>
            </div>
        </div>

        <!-- 5. DATOS CLIENTE -->
        <div class="section-card">
            <div class="floating-icon"><i data-lucide="user"></i></div>
            <div class="section-title">Datos Cliente</div>
            <button class="smart-paste-btn" onclick="openModal('paste')" title="Pegar desde WhatsApp"><i data-lucide="clipboard"></i></button>

            <input type="text" id="nombre" placeholder="Nombre Completo">
            <input type="text" id="rut" placeholder="RUT (12345678-9)">
            <input type="tel" id="telefono" placeholder="Teléfono">
            <input type="email" id="correo" placeholder="Correo Electrónico (Opcional)">
            <input type="text" id="direccion" placeholder="Dirección Exacta">
        </div>

        <!-- 6. DATOS EJECUTIVO -->
        <div class="section-card">
            <div class="floating-icon"><i data-lucide="star"></i></div>
            <div class="section-title">Responsables</div>
            
            <input type="text" id="ejecutivo" placeholder="Nombre Ejecutivo" style="background:#eff6ff; border-color:#dbeafe; color:#1e40af;" readonly>
            <input type="text" id="lider" placeholder="Nombre Líder" style="background:#fdf4ff; border-color:#fce7f3; color:#831843;" readonly>
            <textarea id="obs" placeholder="Observaciones (Opcional)" rows="3"></textarea>
        </div>

    </div>

    <!-- Footer Total -->
    <div class="footer">
        <div>
            <div class="total-label">Mensualidad</div>
            <div class="total-amount" id="total-display">$0</div>
        </div>
        <button class="btn-submit" onclick="submitSale()" id="btn-send">
            VENDER <i data-lucide="check-circle" size="18"></i>
        </button>
    </div>

    <!-- 🟢 MODAL PEGADO INTELIGENTE -->
    <div class="modal-overlay" id="paste-modal">
        <div class="modal-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                <h3 style="margin:0; font-size:18px; font-weight:800;">Pegado Rápido</h3>
                <button onclick="closeModal('paste')" style="border:none; background:none; cursor:pointer; color:#94a3b8;"><i data-lucide="x"></i></button>
            </div>
            <textarea id="paste-area" rows="6" placeholder="Pega aquí el mensaje de WhatsApp..." style="font-size:13px;"></textarea>
            <button onclick="processPaste()" style="width:100%; background:var(--primary); color:white; padding:14px; border:none; border-radius:14px; font-weight:bold; margin-top:15px; cursor:pointer;">Procesar Datos</button>
        </div>
    </div>

    <!-- 🟢 MODAL FEEDBACK UNIFICADO (ÉXITO / ERROR) -->
    <div class="modal-overlay" id="feedback-modal">
        <div class="modal-card" style="text-align:center;">
            <div id="fm-icon-wrapper" class="icon-circle icon-success">
                <i id="fm-icon" data-lucide="check" style="width:40px; height:40px; stroke-width:3px;"></i>
            </div>
            <h3 id="fm-title" style="margin:0 0 10px; font-size:24px; font-weight:800; color:#1e293b;">¡Venta Exitosa!</h3>
            <p id="fm-msg" style="margin:0 0 30px; font-size:14px; color:#64748b; line-height:1.5;">Registrada correctamente.</p>
            <button id="fm-btn" style="width:100%; color:white; padding:16px; border:none; border-radius:18px; font-weight:800; font-size:16px; cursor:pointer; transition: transform 0.2s;">
                Finalizar
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        /* =================================================================================
           🔐 AUTENTICACIÓN Y SEGURIDAD
           ================================================================================= */
        const user = JSON.parse(localStorage.getItem('freework_user'));
        // IMPORTANTE: Si integras esto en Wix y están en iframes distintos, asegúrate de haber pasado por el Login.
        if(!user) {
            console.warn("No hay usuario logueado. Redirigiendo a Login...");
            // window.top.location.href = "index.html"; // Descomentar en producción
        }

        /* =================================================================================
           ⚙️ CONFIGURACIÓN
           ================================================================================= */
        const CONFIG = {
            empresa: "WOM",    
            scriptUrl: "https://script.google.com/macros/s/AKfycbzUn0OHXXwbUX9QHXh2E0YUE9BYhKPU2psJ_lQ-OwDAfu7Cznxu01CIu9XgMA5GGdVI/exec", // URL MAESTRA CORRECTA
            plans: [
                { id: "w600", name: "600 Megas", promo: 13990, normal: 21990 },
                { id: "w800", name: "800 Megas", promo: 15990, normal: 24990 },
                { id: "w940", name: "940 Megas", promo: 16990, normal: 33990 }
            ],
            tv: [
                { id: "wNac", name: "Plan Nacional", price: 7900 },
                { id: "wFut", name: "Plan Fútbol", price: 18900 }
            ],
            equipos: { extensor: 2400, deco: 3990 },
            comunas: {
                "Metropolitana": ["Santiago", "Maipú", "Puente Alto", "La Florida", "Las Condes", "Providencia", "San Bernardo", "Peñalolén", "Pudahuel"],
                "Valparaíso": ["Viña del Mar", "Valparaíso", "Quilpué", "Villa Alemana", "San Antonio"],
                "Biobío": ["Concepción", "Talcahuano", "San Pedro de la Paz", "Los Ángeles"],
                "O'Higgins": ["Rancagua", "Machalí", "San Fernando"]
            }
        };

        /* =================================================================================
           🧠 LÓGICA DE NEGOCIO
           ================================================================================= */
        let state = { isCombo: false, planIdx: 0, tvIdx: 0, ext: 0, deco: 0 };

        function init() {
            // Autocompletar datos del usuario
            if(user) {
                document.getElementById('ejecutivo').value = user.name || '';
                document.getElementById('lider').value = user.leader || 'Sin Asignar';
            }

            document.getElementById('price-ext-display').innerText = `$${CONFIG.equipos.extensor.toLocaleString()}/mes`;
            document.getElementById('price-deco-display').innerText = `$${CONFIG.equipos.deco.toLocaleString()}/mes`;
            renderPlanes();
            renderTvOptions();
            calcTotal();
        }

        function renderPlanes() {
            const container = document.getElementById('planes-list');
            container.innerHTML = '';
            CONFIG.plans.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = `plan-item ${idx === state.planIdx ? 'selected' : ''}`;
                div.onclick = () => { state.planIdx = idx; renderPlanes(); calcTotal(); };
                
                let displayPrice = p.promo;
                let displayNormal = p.normal;
                
                if(state.isCombo) {
                    displayPrice += CONFIG.tv[state.tvIdx].price;
                    displayNormal += CONFIG.tv[state.tvIdx].price;
                }

                div.innerHTML = `
                    <div>
                        <div class="plan-name">${p.name}</div>
                        <div class="plan-meta">Fibra Simétrica</div>
                    </div>
                    <div>
                        <div class="plan-price">$${displayPrice.toLocaleString('es-CL')}</div>
                        <div class="plan-normal">$${displayNormal.toLocaleString('es-CL')}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderTvOptions() {
            const container = document.getElementById('tv-plans-container');
            container.innerHTML = '';
            CONFIG.tv.forEach((t, idx) => {
                const div = document.createElement('div');
                div.className = `toggle-btn ${idx === state.tvIdx ? 'active' : ''}`;
                div.onclick = () => { state.tvIdx = idx; renderTvOptions(); renderPlanes(); calcTotal(); };
                div.innerHTML = `<span>${t.name}</span><span style="font-size:9px; color:var(--primary)">+${t.price.toLocaleString()}</span>`;
                container.appendChild(div);
            });
        }

        function setTipo(isCombo) {
            state.isCombo = isCombo;
            document.getElementById('btn-net').className = `toggle-btn ${!isCombo ? 'active' : ''}`;
            document.getElementById('btn-combo').className = `toggle-btn ${isCombo ? 'active' : ''}`;
            document.getElementById('tv-options').style.display = isCombo ? 'block' : 'none';
            document.getElementById('deco-row').style.display = isCombo ? 'flex' : 'none';
            
            if(!isCombo) state.deco = 0;
            document.getElementById('qty-deco').innerText = state.deco;
            
            renderPlanes();
            calcTotal();
        }

        function updateExtra(type, delta) {
            if(type === 'ext') {
                const newVal = state.ext + delta;
                if(newVal >= 0 && newVal <= 3) state.ext = newVal;
                document.getElementById('qty-ext').innerText = state.ext;
            } else {
                const newVal = state.deco + delta;
                if(newVal >= 0 && newVal <= 3) state.deco = newVal;
                document.getElementById('qty-deco').innerText = state.deco;
            }
            calcTotal();
        }

        function calcTotal() {
            const plan = CONFIG.plans[state.planIdx];
            let total = plan.promo;
            if(state.isCombo) {
                total += CONFIG.tv[state.tvIdx].price;
                total += (state.deco * CONFIG.equipos.deco);
            }
            total += (state.ext * CONFIG.equipos.extensor);
            document.getElementById('total-display').innerText = '$' + total.toLocaleString('es-CL');
        }

        function actualizarComunas() {
            const region = document.getElementById('region').value;
            const sel = document.getElementById('comuna');
            sel.innerHTML = '<option value="">Selecciona Comuna</option>';
            sel.disabled = !region;
            if(region && CONFIG.comunas[region]) {
                CONFIG.comunas[region].forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c; opt.innerText = c;
                    sel.appendChild(opt);
                });
            }
        }

        // --- FUNCIONES DE MODALES ---
        function openModal(type) { 
            const id = type === 'paste' ? 'paste-modal' : 'feedback-modal';
            const modal = document.getElementById(id);
            modal.classList.add('open');
        }
        function closeModal(type) { 
            const id = type === 'paste' ? 'paste-modal' : 'feedback-modal';
            const modal = document.getElementById(id);
            modal.classList.remove('open');
        }

        function showFeedback(type, title, msg, actionCallback) {
            const wrapper = document.getElementById('fm-icon-wrapper');
            const icon = document.getElementById('fm-icon');
            const btn = document.getElementById('fm-btn');
            
            document.getElementById('fm-title').innerText = title;
            document.getElementById('fm-msg').innerText = msg;

            if(type === 'success') {
                wrapper.className = 'icon-circle icon-success';
                icon.setAttribute('data-lucide', 'check');
                btn.style.background = 'var(--gradient)';
                btn.innerText = 'Finalizar y Volver';
            } else {
                wrapper.className = 'icon-circle icon-error';
                icon.setAttribute('data-lucide', 'alert-circle');
                btn.style.background = '#dc2626';
                btn.innerText = 'Corregir Datos';
            }

            btn.onclick = () => {
                closeModal('feedback');
                if(actionCallback) actionCallback();
            };

            lucide.createIcons();
            openModal('feedback');
        }
        
        // --- PEGA INTELIGENTE AVANZADA ---
        const quitarTildes = (t) => t ? t.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : '';
        
        const FIELD_MAP = {
            nombre: { synonyms: ['Nombre', 'Cliente', 'Titular'] },
            rut: { synonyms: ['RUT del Cliente', 'RUT Cliente', 'RUT', 'Cedula'] },
            telefono: { synonyms: ['Teléfono', 'Telefono', 'Celular', 'Fono', 'Contacto'] },
            correo: { synonyms: ['Correo', 'Correo Electrónico', 'Email', 'Mail'] },
            direccion: { synonyms: ['Dirección', 'Direccion', 'Calle', 'Domicilio'] },
            comuna: { synonyms: ['Comuna', 'Ciudad', 'Localidad'] }
        };

        function processPaste() {
            const text = document.getElementById('paste-area').value;
            if(!text) return;
            
            const processedData = {};
            const synonymMap = {};
            
            // Construir mapa inverso de sinónimos
            for (const [canonicalName, config] of Object.entries(FIELD_MAP)) { 
                for (const synonym of config.synonyms) synonymMap[quitarTildes(synonym)] = canonicalName; 
            }
            
            // Analizar líneas
            text.split('\n').map(line => line.trim()).filter(Boolean).forEach(line => {
                const separatorIndex = line.indexOf(':'); if (separatorIndex === -1) return;
                let key = line.substring(0, separatorIndex).trim().replace(/^[^a-zA-Z0-9]+/, ''); 
                let value = line.substring(separatorIndex + 1).trim();
                const canonicalName = synonymMap[quitarTildes(key)]; 
                if (canonicalName && value) processedData[canonicalName] = value;
            });

            // Asignar Valores a Inputs
            if(processedData.nombre) document.getElementById('nombre').value = processedData.nombre;
            if(processedData.rut) document.getElementById('rut').value = processedData.rut;
            if(processedData.direccion) document.getElementById('direccion').value = processedData.direccion;
            if(processedData.telefono) document.getElementById('telefono').value = processedData.telefono;
            if(processedData.correo) document.getElementById('correo').value = processedData.correo;
            
            // Lógica Mágica para Comuna y Región
            if(processedData.comuna) { 
                const comunaValue = processedData.comuna;
                let foundRegion = "";
                // Buscar a qué región pertenece esa comuna
                for (let r in CONFIG.comunas) {
                    if (CONFIG.comunas[r].some(c => c.toLowerCase() === comunaValue.toLowerCase())) {
                        foundRegion = r; break;
                    }
                }
                
                if (foundRegion) {
                    document.getElementById('region').value = foundRegion;
                    actualizarComunas(); // Cargar la lista
                    
                    // Buscar el option exacto (respetando mayúsculas/minúsculas)
                    const selectComuna = document.getElementById('comuna');
                    for(let i=0; i < selectComuna.options.length; i++) {
                        if(selectComuna.options[i].value.toLowerCase() === comunaValue.toLowerCase()) {
                            selectComuna.selectedIndex = i; break;
                        }
                    }
                }
            }

            closeModal('paste');
        }

        // --- ENVÍO DE FORMULARIO CON FORMATO EXACTO ---
        async function submitSale() {
            const fields = ['region','comuna','nombre','rut','telefono','direccion','ejecutivo'];
            for(let id of fields) {
                if(!document.getElementById(id).value) {
                    showFeedback('error', 'Faltan Datos', `Asegúrate de completar el campo: ${id.toUpperCase()}`, null);
                    return;
                }
            }

            const btn = document.getElementById('btn-send');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = 'Enviando... <i data-lucide="loader-2" class="animate-spin"></i>';
            lucide.createIcons();

            const plan = CONFIG.plans[state.planIdx];
            const tvPlanName = state.isCombo ? CONFIG.tv[state.tvIdx].name : '';
            const obsFinal = document.getElementById('obs').value + ` | Ext: ${state.ext} | Deco: ${state.deco} | Total: ${document.getElementById('total-display').innerText}`;

            // FORMATO EXACTO PARA EL GOOGLE SCRIPT DE FREEWORK
            const saleData = {
                timestamp: new Date().toLocaleString("es-CL"),
                empresa: CONFIG.empresa,
                nombre: document.getElementById('nombre').value,
                rUT: document.getElementById('rut').value, // <--- CUIDADO: La DB espera rUT (mayúsculas)
                serie: "",
                teléfono: document.getElementById('telefono').value,
                correo: document.getElementById('correo').value,
                dirección: document.getElementById('direccion').value,
                comuna: document.getElementById('comuna').value,
                región: document.getElementById('region').value,
                planContratado: `${plan.name}${state.isCombo ? ' + ' + tvPlanName : ''}`,
                observaciones: obsFinal,
                ejecutivo: document.getElementById('ejecutivo').value,
                supervisor: document.getElementById('lider').value,
                obsback: "Pendiente"
            };

            try {
                const res = await fetch(CONFIG.scriptUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Usamos text/plain para evitar errores de CORS en Sheets
                    body: JSON.stringify({ data: saleData })
                });
                
                const data = await res.json();
                
                if(data && data.success) {
                    showFeedback('success', '¡Gran trabajo! 🚀', 'La solicitud de WOM ha sido registrada.', () => {
                        window.top.location.href = "marcas.html"; // Vuelve a inicio Wix
                    });
                } else {
                    showFeedback('error', 'Error del Servidor', 'No pudimos guardar la venta. Intenta nuevamente.', null);
                }
            } catch(err) {
                showFeedback('error', 'Error de Conexión', 'Se perdió la conexión con el sistema central.', null);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        }

        init();
    </script>
</body>
