<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Freework · Elite Premium Hub</title>
    
    <!-- Tailwind CSS y Fuentes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PRECARGA LOCAL AGRESIVA -->
    <link rel="prefetch" href="hub.html" as="document">
    <link rel="prefetch" href="marcas.html" as="document">
    <link rel="prefetch" href="informe.html" as="document">
    <link rel="prefetch" href="perfil.html" as="document">

    <style>
        /* ============================================================
           1. VARIABLES GLOBALES PREMIUM
           ============================================================ */
        :root {
            /* Menú Principal */
            --glass-bg: rgba(8, 10, 15, 0.82);
            --glass-border-top: rgba(255, 255, 255, 0.15);
            --glass-border-bottom: rgba(255, 255, 255, 0.03);
            --active-glow: #a855f7; 
            --icon-default: #64748b;
            --icon-active: #ffffff;
            --font-primary: 'Inter', system-ui, sans-serif;
            --spring-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-curve: cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Colores Originales Restaurados (Píldoras del Dock) */
            --pill-h:      54px;
            --pill-gap:    10px;
            --pill-bg:     rgba(10, 8, 22, 0.93);
            --pill-border: rgba(255, 255, 255, 0.08);
            --pill-hover:  rgba(22, 16, 44, 0.97);
            --active-a:    #4f46e5;
            --active-b:    #9333ea;
            --active-c:    #ec4899;
            --text-dim:    rgba(255, 255, 255, 0.7);
        }
        
        /* PROTECCIÓN ANTI-SELECCIÓN (Nivel App Nativa) */
        html, body {
            background: #000000 !important;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden; 
            font-family: var(--font-primary);
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none; /* Evita menú contextual en iOS */
            -webkit-user-select: none;   /* Safari */
            user-select: none;           /* Standard */
        }

        /* Permite escribir en inputs del asistente */
        input, textarea {
            -webkit-user-select: auto;
            user-select: auto;
        }

        /* ============================================================
           2. SISTEMA DE CAPAS Y CARGA (HUB PRINCIPAL)
           ============================================================ */
        #layers-container {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100dvh;
            z-index: 10; overflow: hidden; background: #000000;
        }

       .web-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%; display: block;
            border: none; margin: 0; padding: 0;
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s var(--smooth-curve), transform 0.4s var(--smooth-curve);
            transform: scale(0.98); background: #000000;
        }
        .web-layer.active { opacity: 1; transform: scale(1); pointer-events: auto; z-index: 20; }

        #premium-loader {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 9998; display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #premium-loader.active { opacity: 1; pointer-events: auto; }

        .spinner-ring {
            width: 44px; height: 44px; border: 3px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--active-glow); border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ============================================================
           3. MENÚ HYPER-GLASS Y DOCK INTEGRADO
           ============================================================ */
        .menu-wrapper {
            position: fixed; bottom: max(24px, env(safe-area-inset-bottom, 24px));
            left: 0; right: 0; display: flex; justify-content: center;
            padding: 0 16px; z-index: 9999; pointer-events: none;
        }

        .nav-menu {
            width: 100%; max-width: 440px; height: 76px; border-radius: 38px;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 8px; pointer-events: auto;
            background: var(--glass-bg);
            backdrop-filter: blur(32px) saturate(200%); -webkit-backdrop-filter: blur(32px) saturate(200%);
            border-top: 1px solid var(--glass-border-top); border-bottom: 1px solid var(--glass-border-bottom);
            border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 40px 80px -10px rgba(0, 0, 0, 0.95), 0 20px 40px -20px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .nav-item {
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 72px; height: 100%; cursor: pointer; transform: translateZ(0); will-change: transform;
        }

        .nav-item:active .icon-unit { transform: scale(0.85); opacity: 0.8; transition: all 0.1s ease; }

        .nav-item .bg-glow {
            position: absolute; top: 50%; left: 50%; width: 48px; height: 48px; border-radius: 50%;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            transform: translate(-50%, -50%) scale(0.3); opacity: 0; transition: all 0.5s var(--spring-curve); pointer-events: none;
        }

        .nav-item .icon-unit {
            position: relative; z-index: 5; color: var(--icon-default);
            transition: color 0.3s ease, transform 0.5s var(--spring-curve);
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
        }

        .nav-item .icon-unit svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        .nav-item .label-text {
            position: absolute; bottom: 12px; font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase;
            font-weight: 700; color: #ffffff; opacity: 0; transform: translateY(12px);
            transition: opacity 0.3s ease, transform 0.4s var(--spring-curve); white-space: nowrap; pointer-events: none;
        }

        .nav-item .active-indicator {
            position: absolute; bottom: 4px; width: 0px; height: 4px; border-radius: 4px;
            background: #ffffff; opacity: 0; transition: width 0.4s var(--spring-curve), opacity 0.3s ease; box-shadow: 0 0 12px var(--active-glow);
        }

        /* Estados Activos del Menú */
        .nav-item.is-active .bg-glow { opacity: 1; transform: translate(-50%, -50%) scale(1.1); top: calc(50% - 12px); }
        .nav-item.is-active .icon-unit { transform: translateY(-12px); color: var(--icon-active); filter: drop-shadow(0 6px 10px rgba(168, 85, 247, 0.5)); }
        .nav-item.is-active .label-text { opacity: 1; transform: translateY(0); font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .nav-item.is-active .active-indicator { width: 18px; opacity: 1; }

        /* Estado Especial: Botón Dock (5º botón convertido en el Orbe de color) */
        #dockTriggerBtn .icon-unit {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--active-a), var(--active-b), var(--active-c));
            color: #ffffff;
            box-shadow: 
                0 16px 32px -8px rgba(168, 85, 247, 0.7), 
                inset 0 -4px 10px rgba(0,0,0,0.2), 
                inset 0 4px 10px rgba(255,255,255,0.4);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.5s var(--spring-curve);
        }
        
        #dockTriggerBtn .icon-unit svg {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            transition: transform 0.4s var(--spring-curve);
        }
        
        #dockTriggerBtn .bg-glow {
            display: none; /* Ocultamos el brillo gris genérico porque el orbe ya brilla */
        }
        
        #dockTriggerBtn.dock-open .icon-unit {
            transform: scale(0.9);
            box-shadow: 0 4px 12px -2px rgba(168, 85, 247, 0.5);
            border-color: rgba(255,255,255,0.1);
        }
        
        #dockTriggerBtn.dock-open .icon-unit svg {
            transform: rotate(45deg);
        }

        /* ============================================================
           4. COMPONENTES DEL DOCK EXPANDIBLE (PÍLDORAS ADAPTATIVAS)
           ============================================================ */
        .dock-container {
            position: absolute;
            bottom: calc(100% + 15px);
            right: 9px; /* Centrado perfecto sobre el orbe de 72px */
            display: flex; flex-direction: column; gap: var(--pill-gap);
            align-items: flex-end; pointer-events: none; z-index: 10000;
        }

        .pill {
            display: flex; align-items: center; flex-direction: row-reverse;
            height: var(--pill-h); width: var(--pill-h); border-radius: 999px;
            background: var(--pill-bg); border: 1px solid var(--pill-border);
            box-shadow: 0 10px 28px -8px rgba(0,0,0,0.55); overflow: hidden; white-space: nowrap;
            text-decoration: none; color: var(--text-dim); padding: 0 5px; opacity: 0;
            transform: translateY(20px) scale(0.6); pointer-events: none; position: relative;
            will-change: transform, opacity, width; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: width .5s var(--spring-curve), background .3s ease, box-shadow .3s ease, color .3s ease, border-color .3s ease, transform .3s ease;
        }

        @keyframes pill-born {
            0%  { opacity: 0; transform: translateY(20px) scale(0.6); filter: blur(4px); }
            100%{ opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        @keyframes pill-die {
            0%  { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
            100%{ opacity: 0; transform: translateY(20px) scale(0.6); filter: blur(4px); }
        }
        
        .pill.born  { animation: pill-born .5s var(--spring-curve) forwards; pointer-events: auto; }
        .pill.dying { animation: pill-die .3s cubic-bezier(0.4, 0, 1, 1) forwards; pointer-events: none; }

        .pill.active {
            background: linear-gradient(135deg, var(--active-a), var(--active-b), var(--active-c));
            color: #fff; border-color: transparent; 
            box-shadow: 0 16px 32px -8px rgba(147, 51, 234, 0.5), inset 0 1px 1px rgba(255,255,255,0.4);
        }
        
        /* Puntito indicador con centrado matemático perfecto */
        .pill.active::after {
            content: ''; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            width: 6px; height: 6px; border-radius: 50%;
            background: #fff; box-shadow: 0 0 12px rgba(255,255,255,0.8); 
            animation: dot-blink 2.5s ease-in-out infinite;
        }
        
        @keyframes dot-blink { 
            0%, 100% { opacity: 1; box-shadow: 0 0 12px rgba(255,255,255,0.8); } 
            50% { opacity: 0.5; box-shadow: 0 0 4px rgba(255,255,255,0.4); } 
        }

        @media (hover: hover) {
            .pill:hover:not(.active) {
                background: var(--pill-hover); color: #fff;
                transform: translateX(-4px) !important;
                box-shadow: 0 12px 24px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.15);
            }
        }

        .pill-icon {
            width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; position: relative; z-index: 1;
        }
        .pill-icon svg { width: 20px; height: 20px; transition: transform .3s var(--spring-curve), filter .3s ease; stroke: currentColor; stroke-width: 2.2; fill: none;}
        .pill.active .pill-icon svg { filter: drop-shadow(0 0 6px rgba(255,255,255,0.5)); color: white;}

        /* Etiqueta adaptativa perfecta */
        .pill-label {
            font-weight: 500; font-size: 14px; letter-spacing: 0.01em; 
            margin-right: 8px; padding-left: 22px; line-height: 1;
            opacity: 0; transform: translateX(8px);
            transition: opacity .4s var(--spring-curve) .05s, transform .4s var(--spring-curve) .05s;
            pointer-events: none; color: inherit; flex-shrink: 0;
        }
        .pill.active .pill-label { opacity: 1; transform: translateX(0); }

        /* ============================================================
           5. MODALES (BOTTOM SHEET & IA)
           ============================================================ */
        .modal-backdrop {
            position: fixed; inset: 0; z-index: 99998; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            opacity: 0; pointer-events: none; transition: opacity .4s ease;
        }
        .modal-backdrop.visible { opacity: 1; pointer-events: auto; }

        .modal-sheet {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999; height: 88dvh;
            background: rgba(15, 15, 22, 0.85); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 32px 32px 0 0; border-top: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 -30px 60px -15px rgba(0,0,0,0.5), 0 -10px 30px -10px rgba(168, 85, 247, 0.2);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(100%); transition: transform .5s var(--spring-curve);
        }
        .modal-sheet.visible { transform: translateY(0); }

        .modal-handle { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); position: relative; }
        .modal-handle-pill { width: 48px; height: 5px; border-radius: 99px; background: rgba(255,255,255,0.2); position: absolute; left: 50%; transform: translateX(-50%); top: 12px; }
        .modal-title { font-weight: 600; font-size: 16px; color: #fff; letter-spacing: -0.02em; }
        .modal-close-btn {
            width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.8); transition: all .2s ease;
        }
        .modal-close-btn svg { width: 16px; height: 16px; stroke-width: 2.5; stroke: currentColor; fill: none; }
        .modal-iframe { flex: 1; width: 100%; border: none; background: #fff; }

        .assistant-modal {
            position: fixed; bottom: 120px; right: 16px; width: calc(100vw - 32px); max-width: 380px;
            background: rgba(18, 18, 24, 0.95); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 32px; padding: 24px; color: white; z-index: 99995; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1), 0 20px 40px -10px rgba(168, 85, 247, 0.2);
            opacity: 0; visibility: hidden; transform: translateY(20px) scale(0.95); transition: all 0.4s var(--spring-curve); pointer-events: none;
        }
        .assistant-modal.visible { opacity: 1; visibility: visible; transform: translateY(0) scale(1); pointer-events: auto; }
        .assistant-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
        .assistant-avatar { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--active-a), var(--active-c)); display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 24px -6px rgba(168, 85, 247, 0.5), inset 0 2px 4px rgba(255,255,255,0.3); }
        .assistant-title { font-weight: 700; font-size: 17px; letter-spacing: -0.02em; background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .assistant-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); font-weight: 400; }
        .assistant-messages { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 16px; margin-bottom: 20px; max-height: 220px; overflow-y: auto; scrollbar-width: none; border: 1px solid rgba(255,255,255,0.03); }
        .assistant-messages::-webkit-scrollbar { display: none; }
        .message { margin-bottom: 12px; font-size: 14px; line-height: 1.5; font-weight: 400; letter-spacing: -0.01em; }
        .message.ia { color: #e2e8f0; }
        .message.user { color: #fff; text-align: right; }
        .assistant-input { display: flex; gap: 10px; }
        .assistant-input input { flex: 1; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); border-radius: 99px; padding: 14px 18px; color: white; font-size: 16px; font-family: var(--font-primary); transition: border-color 0.3s ease; }
        .assistant-input input:focus { outline: none; border-color: rgba(168, 85, 247, 0.6); background: rgba(0,0,0,0.35); }
        .assistant-input button { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--active-a), var(--active-b)); border: none; color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3); }
        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.05); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: none; color: white; opacity: 0.7; cursor: pointer; font-size: 14px; transition: all 0.2s; }
    </style>
</head>
<body>

    <!-- COLECCIÓN COMPLETA DE ÍCONOS ORIGINALES DEL DOCK -->
    <svg style="display:none">
        <defs>
            <symbol id="ico-home"      viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
            <symbol id="ico-star"      viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></symbol>
            <symbol id="ico-zap"       viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></symbol>
            <symbol id="ico-briefcase" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></symbol>
            <symbol id="ico-chat"      viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></symbol>
            <symbol id="ico-layers"    viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></symbol>
        </defs>
    </svg>

    <!-- Pantalla de carga inteligente -->
    <div id="premium-loader"><div class="spinner-ring"></div></div>

    <!-- Contenedor de Vistas Principales -->
    <div id="layers-container"></div>

    <!-- Modales Externos (Sheet y Chatbot) -->
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-sheet" id="modalSheet">
        <div class="modal-handle">
            <div class="modal-handle-pill"></div>
            <span class="modal-title" id="modalTitle"></span>

    <div id="assistantModal" class="assistant-modal">

        </div>

    <!-- Menú Nativo -->
    <div class="menu-wrapper">
        <nav class="nav-menu">
            <!-- Pestaña 1: Hub -->
            <div class="nav-item is-active" data-tab="hub" onclick="switchTab('hub', 'hub.html', this)">
                <div class="bg-glow"></div>
                <div class="icon-unit"><svg viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
                <span class="label-text">Hub</span>
                <div class="active-indicator"></div>
            </div>
            
            <!-- Pestaña 2: Ventas -->
            <div class="nav-item" data-tab="ventas" onclick="switchTab('ventas', 'marcas.html', this)">
                <div class="bg-glow"></div>
                <div class="icon-unit"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
                <span class="label-text">Ventas</span>
                <div class="active-indicator"></div>
            </div>
            
            <!-- Pestaña 3: Panel -->
            <div class="nav-item" data-tab="panel" onclick="switchTab('panel', 'informe.html', this)">
                <div class="bg-glow"></div>
                <div class="icon-unit"><svg viewBox="0 0 24 24"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></div>
                <span class="label-text">Panel</span>
                <div class="active-indicator"></div>
            </div>
            
            <!-- Pestaña 4: Perfil -->
            <div class="nav-item" data-tab="perfil" onclick="switchTab('perfil', 'perfil.html', this)">
                <div class="bg-glow"></div>
                <div class="icon-unit"><svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                <span class="label-text">Perfil</span>
                <div class="active-indicator"></div>

                <div class="bg-glow"></div>
                <div class="icon-unit"><svg><use href="#ico-layers"/></svg></div>

    <script>

        const DOCK_CONFIG = [

            { name: "Asistente IA", icon: "chat",      type: "assistant", url: "" },

        // 1. Navegación Principal (Iframes de fondo)
        function switchTab(id, url, element) {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
            if (isDockOpen) closeDock(); // Cerrar dock si cambias de pestaña

            const items = document.querySelectorAll('.nav-item:not(#dockTriggerBtn)');
            items.forEach(item => item.classList.remove('is-active'));
            if(element) element.classList.add('is-active');

            Object.values(layers).forEach(layer => layer.classList.remove('active'));

            if (!layers[id]) {
                loadingTimeout = setTimeout(() => loaderOverlay.classList.add('active'), 150);
                createLayer(id, url, true);
            } else if (layers[id].dataset.loaded !== "true") {
                loaderOverlay.classList.add('active');
                layers[id].classList.add('active');
            } else {
                layers[id].classList.add('active');
            }
        }

       function createLayer(id, url, isImmediate = false) {
    const iframe = document.createElement('iframe');
    
    // 🔥 LA MAGIA: Le inyectamos los datos a la URL interna
    let urlFinal = url;
    if (usuarioNombreGlobal || usuarioIdGlobal) {
        // Verifica si la URL ya tiene un '?' para poner '&' o '?'
        const separador = urlFinal.includes('?') ? '&' : '?';
        urlFinal += `${separador}nombre=${encodeURIComponent(usuarioNombreGlobal)}&id=${encodeURIComponent(usuarioIdGlobal)}`;
    }
    
    iframe.src = urlFinal; // <-- Usa la URL con los datos pegados
    iframe.className = 'web-layer'; 
    iframe.id = `layer-${id}`; 
    iframe.dataset.loaded = "false";
    
    // ... (el resto de tu función iframe.onload se queda exactamente igual)
    iframe.onload = () => {
        iframe.dataset.loaded = "true";
        try {
            const style = iframe.contentWindow.document.createElement('style');
            style.textContent = `* { -webkit-tap-highlight-color: transparent !important; user-select: none !important; -webkit-user-select: none !important; -webkit-touch-callout: none !important; } a, button, input { outline: none !important; } input, textarea { user-select: auto !important; -webkit-user-select: auto !important; }`;
            iframe.contentWindow.document.head.appendChild(style);
        } catch (e) {}

        if (iframe.classList.contains('active') || isImmediate) {
            clearTimeout(loadingTimeout); loaderOverlay.classList.remove('active'); iframe.classList.add('active');

    container.appendChild(iframe); layers[id] = iframe;
}

        /* ============================================================
           LÓGICA DEL DOCK INTEGRADO (5º BOTÓN) - MATEMÁTICA PERFECTA
           ============================================================ */
        const pillsCol = document.getElementById('pills-col');

        // Medidor invisible sincronizado 100% con la fuente CSS de .pill-label
        const ruler = document.createElement('span');
        Object.assign(ruler.style, { 
            position:'absolute', visibility:'hidden', whiteSpace:'nowrap', pointerEvents:'none', 
            fontFamily:"var(--font-primary)", fontWeight:'500', fontSize:'14px', letterSpacing:'0.01em' 
        });
        document.body.appendChild(ruler);

        // Cálculo adaptativo real que no corta ningún texto
        function getPillWidth(text) {
            ruler.textContent = text;
            // 84px es la suma exacta de todos los paddings, márgenes y el ícono fijo (42+8+22+10+2)
            return 84 + ruler.offsetWidth;
        }

        // Construir píldoras en el HTML
        DOCK_CONFIG.forEach((item, i) => {

            a.innerHTML = `
                <div class="pill-icon"><svg><use href="#ico-${item.icon}"/></svg></div>
                <span class="pill-label">${item.name}</span>
            `;

            a.addEventListener('click', e => {
                e.preventDefault(); e.stopPropagation();

                if (a.classList.contains('active')) {
                    if (item.type === 'assistant') document.getElementById('assistantModal').classList.add('visible');
                    else openModal(item.name, item.url);
                    closeDock();
                } else {
                    pillsList.forEach(({ el }, pi) => {
                        el.classList.toggle('active', pi === i);
                        el.style.width = (pi === i ? pillsList[pi].w : 54) + 'px';
                    });
                }
            });

            pillsCol.appendChild(a);
            pillsList.push({ el: a, w });
        });

        // Funciones de Abrir/Cerrar Dock
        function toggleDock(e, btn) {
            e.preventDefault(); e.stopPropagation();
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
            isDockOpen ? closeDock() : openDock();
        }

        function openDock() {
            isDockOpen = true; dockTriggerBtn.classList.add('dock-open');
            dockTimers.forEach(clearTimeout); dockTimers = [];
            
            pillsList.forEach(({ el }) => { el.classList.remove('born','dying','active'); el.style.opacity = '0'; el.style.animation = 'none'; el.style.width = '54px'; });
            
            [...pillsList].reverse().forEach(({ el }, s) => {
                dockTimers.push(setTimeout(() => {
                    el.style.animation = ''; el.classList.add('born'); el.style.opacity = '';
                }, s * 80));
            });
        }

        function closeDock() {
            if(!isDockOpen) return;
            isDockOpen = false; dockTriggerBtn.classList.remove('dock-open');
            dockTimers.forEach(clearTimeout); dockTimers = [];

            pillsList.forEach(({ el }, i) => {
                dockTimers.push(setTimeout(() => {
                    el.classList.remove('born'); el.classList.add('dying');
                    dockTimers.push(setTimeout(() => { el.classList.remove('dying'); el.style.opacity = '0'; el.style.animation = 'none'; }, 300));
                }, i * 50));
            });
        }

        // Clic fuera del dock para cerrarlo
        document.addEventListener('click', (e) => {

        /* ============================================================

        function openModal(title, url) {

        }

            backdrop.classList.remove('visible'); sheet.classList.remove('visible');
            setTimeout(() => { modalFrame.src = 'about:blank'; }, 400);
        }

        document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
        backdrop.addEventListener('click', closeModal);

        // Swipe down para cerrar modal
        let swipeY0 = 0;
        sheet.addEventListener('touchstart', e => { swipeY0 = e.touches[0].clientY; }, { passive:true });
        sheet.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - swipeY0 > 80) closeModal(); }, { passive:true });

        /* ============================================================
           CHATBOT IA FUNCIONALIDAD
           ============================================================ */
        const assistantModal = document.getElementById('assistantModal');
        const assistantInput = document.getElementById('assistantInput');
        const assistantMessages = document.getElementById('assistantMessages');

        document.getElementById('closeAssistant').addEventListener('click', () => assistantModal.classList.remove('visible'));

        function addMessage(text, isUser = false) {
            const div = document.createElement('div'); div.className = `message ${isUser ? 'user' : 'ia'}`; div.textContent = text;
            assistantMessages.appendChild(div); assistantMessages.scrollTop = assistantMessages.scrollHeight;
        }

        function handleSendMessage() {
            const msg = assistantInput.value.trim(); if (!msg) return;
            addMessage(msg, true); assistantInput.value = ''; addMessage('🤔 Pensando...', false);
            setTimeout(() => {
                if (assistantMessages.lastChild.textContent === '🤔 Pensando...') assistantMessages.removeChild(assistantMessages.lastChild);
                addMessage("Esta interfaz ya está fusionada. ¡Conecta tu API cuando quieras!", false);
            }, 1000);
        }

        document.getElementById('sendMessageBtn').addEventListener('click', handleSendMessage);
        assistantInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleSendMessage(); });

        /* ============================================================
           INICIALIZACIÓN INMEDIATA
           ============================================================ */
        window.navigateToTab = function(tabId) {
            const tabButton = document.querySelector(`.nav-item[data-tab="${tabId}"]`);
            if (tabButton) tabButton.click();
        };

        // Leer usuario desde URL y guardarlo en localStorage
let usuarioNombreGlobal = "";
let usuarioIdGlobal = "";

(function() {

<body class="bg-transparent m-0 p-0 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ===================================================================
    // 1. CONFIGURACIÓN API
    // ===================================================================
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI_zmAoT3Y6FD7Qfg9hUYp2SYuVNr6kvQgDVROngwQsm_qLtwEDJkHvQLeXE7LwJw5/exec"; 

    const api = {
      get: async (action) => {
        try {
          const res = await fetch(`${SCRIPT_URL}?action=${action}`);
          return await res.json();
        } catch (e) { return []; }
      },
      post: async (action, data) => {
        try {
          const res = await fetch(SCRIPT_URL, {
            method: 'POST', body: JSON.stringify({ action, data }), headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          return await res.json();
        } catch (e) { return { success: false }; }
      }
    };

    // ===================================================================
    // 2. COMPONENTE INTERFAZ DEL CLIENTE
    // ===================================================================
    function ClientWebsite({ allMessages, allChats, cannedResponses }) {
      const [isOpen, setIsOpen] = useState(false);
      const [newMessage, setNewMessage] = useState('');
      const [showEmojis, setShowEmojis] = useState(false);
      const emojis = ['😀','😂','😊','🥰','😎','🤔','👍','👎','🔥','✨','🎉','🚀','✅','❌','👀','⚡','📡','🔧','🏢','📝'];
      
      // --- SISTEMA DE ARRASTRE (DRAG & DROP) ---
      const [pos, setPos] = useState(null); // { right, bottom }
      const [isDragging, setIsDragging] = useState(false);
      const widgetRef = useRef(null);
      const dragRef = useRef({ startX: 0, startY: 0, initialRight: 0, initialBottom: 0, isDragMove: false });

      const handleDragStart = (e) => {
        // Ignorar clic derecho o clics en botones de cierre
        if (e.type.includes('mouse') && e.button !== 0) return;
        if (e.target.closest('button') && !e.target.closest('.drag-handle')) return;
        
        const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
        const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        
        const rect = widgetRef.current.getBoundingClientRect();
        const initialRight = window.innerWidth - rect.right;
        const initialBottom = window.innerHeight - rect.bottom;
        
        dragRef.current = { startX: clientX, startY: clientY, initialRight, initialBottom, isDragMove: false };
        if (!pos) setPos({ right: initialRight, bottom: initialBottom });
        
        setIsDragging(true);
      };

      useEffect(() => {
        const handleDragMove = (e) => {
          if (!isDragging) return;
          e.preventDefault(); // Prevenir scroll en móviles al arrastrar
          
          const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
          const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
          
          const dx = clientX - dragRef.current.startX;
          const dy = clientY - dragRef.current.startY;
          
          // Si hay movimiento real, lo marcamos para no confundirlo con un clic
          if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragRef.current.isDragMove = true;
          
          let newRight = dragRef.current.initialRight - dx;
          let newBottom = dragRef.current.initialBottom - dy;
          
          // Limites para que no se salga de la pantalla
          const rect = widgetRef.current.getBoundingClientRect();
          const maxRight = window.innerWidth - rect.width;
          const maxBottom = window.innerHeight - rect.height;
          
          newRight = Math.max(0, Math.min(newRight, maxRight));
          newBottom = Math.max(0, Math.min(newBottom, maxBottom));
          
          setPos({ right: newRight, bottom: newBottom });
        };

        const handleDragEnd = () => setIsDragging(false);

        if (isDragging) {
          window.addEventListener('mousemove', handleDragMove, { passive: false });
          window.addEventListener('mouseup', handleDragEnd);
          window.addEventListener('touchmove', handleDragMove, { passive: false });
          window.addEventListener('touchend', handleDragEnd);
        }

        return () => {
          window.removeEventListener('mousemove', handleDragMove);
          window.removeEventListener('mouseup', handleDragEnd);
          window.removeEventListener('touchmove', handleDragMove);
          window.removeEventListener('touchend', handleDragEnd);
        };
      }, [isDragging]);

      const toggleOpen = (e) => {
        // Evitar que se abra/cierre si el usuario solo quería arrastrarlo
        if (dragRef.current?.isDragMove) {
          e.preventDefault(); e.stopPropagation(); return;
        }
        setIsOpen(prev => !prev);
      };

      // --- FIN SISTEMA DE ARRASTRE ---

      const getEliteUser = () => {
        try {
          const params = new URLSearchParams(window.location.search);
          const pName = params.get('nombre') || params.get('name');
          const pId = params.get('id') || params.get('email');
          if (pName) return { name: pName, id: pId };

          const userStr = localStorage.getItem('freework_user');
          if (userStr) {
             const u = JSON.parse(userStr);
             return { name: u.name || u.nombre, id: u.id || u.email || u.id_usuario };
          }
          
          const fallbackName = localStorage.getItem('freework_user_name');
          if (fallbackName) return { name: fallbackName, id: localStorage.getItem('freework_user_id') };
        } catch (e) {}
        return null;
      };

      const [clientName, setClientName] = useState(() => getEliteUser()?.name || '');
      const [isRegistered, setIsRegistered] = useState(() => !!getEliteUser()?.name);

      useEffect(() => {
        const interval = setInterval(() => {
          if (!isRegistered) {
            const user = getEliteUser();
            if (user?.name) { setClientName(user.name); setIsRegistered(true); }
          }
        }, 1000);
        return () => clearInterval(interval);
      }, [isRegistered]);

      const [hasUnread, setHasUnread] = useState(false);
      const messagesEndRef = useRef(null);
      const prevMsgCount = useRef(0);

      const [clientId] = useState(() => {
        const user = getEliteUser();
        let id = user?.id || localStorage.getItem('chat_client_id');
        if (!id) { id = 'cliente_' + Math.floor(Math.random() * 1000000); localStorage.setItem('chat_client_id', id); }
        return id;
      });

      const myMessages = useMemo(() => allMessages.filter(msg => msg.conversationId === clientId).sort((a, b) => a.timestamp - b.timestamp), [allMessages, clientId]);

      useEffect(() => {
        if (myMessages.length > prevMsgCount.current) {
          if (myMessages[myMessages.length - 1].sender !== 'client' && !isOpen) setHasUnread(true);
        }
        prevMsgCount.current = myMessages.length;
      }, [myMessages, isOpen]);

      useEffect(() => { if (isOpen) setHasUnread(false); }, [isOpen]);
      useEffect(() => { if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [myMessages, isOpen]);

      const handleRegister = () => {
        if (!clientName.trim()) return;
        setIsRegistered(true);
        
        // 🤖 BOT: Disparar mensaje de ONBOARDING (si existe)
        const onboard = cannedResponses?.find(r => r.title?.toUpperCase().trim() === 'ONBOARDING');
        if (onboard) {
          setTimeout(() => {
            api.post('sendMessage', { 
              chatId: clientId, 
              senderRole: 'admin', 
              senderName: 'SISTEMA', 
              text: onboard.text.replace(/\{nombre\}/gi, clientName) 
            });
          }, 1200); // 1.2 segundos de delay simulando escritura
        }
      };

      const handleSendMessage = async (e) => {
        e.preventDefault();
        if (!newMessage.trim() || !clientName) return;
        const text = newMessage.trim(); setNewMessage(''); setShowEmojis(false);
        
        // 1. Enviar mensaje del cliente
        await api.post('sendMessage', { chatId: clientId, senderRole: 'client', senderName: clientName, text });
        
        // 2. 🤖 BOT: Buscar respuestas por palabras clave
        const textLower = text.toLowerCase();
        const matchedCanned = cannedResponses?.find(r => {
          if (!r.title || r.title.toUpperCase().trim() === 'ONBOARDING') return false;
          // Separar el título por comas para obtener las palabras clave
          const keywords = r.title.split(',').map(k => k.trim().toLowerCase()).filter(Boolean);
          return keywords.some(k => textLower.includes(k));
        });

        if (matchedCanned) {
          setTimeout(() => {
            api.post('sendMessage', { 
              chatId: clientId, 
              senderRole: 'admin', 
              senderName: 'SISTEMA', 
              text: matchedCanned.text.replace(/\{nombre\}/gi, clientName) 
            });
          }, 1500); // 1.5s de delay para que parezca natural
        }
      };

      const addEmoji = (emoji) => setNewMessage(prev => prev + emoji);

      return (
        <div className={`h-screen w-full relative overflow-hidden flex flex-col font-sans pointer-events-none ${isDragging ? 'dragging-active' : ''}`}>
          
          {/* CONTENEDOR MAESTRO ARRASTRABLE */}
          <div 
            ref={widgetRef}
            className={`absolute z-50 flex flex-col items-end pointer-events-auto ${!pos ? 'bottom-28 right-6' : ''}`}
            style={pos ? { right: pos.right, bottom: pos.bottom, transition: isDragging ? 'none' : 'bottom 0.2s, right 0.2s' } : {}}
          >
            {/* ESTADO 1: BOTÓN FLOTANTE */}
            {!isOpen && (
              <button 
                onMouseDown={handleDragStart}
                onTouchStart={handleDragStart}
                onClick={toggleOpen}
                className={`drag-handle btn-premium group flex items-center bg-gradient-to-r from-[#b233ff]/80 to-[#ff4df8]/80 backdrop-blur-md text-white rounded-full transition-all duration-300 outline-none relative overflow-hidden border border-white/30 cursor-move ${isDragging ? 'scale-95' : 'hover:pr-8 hover:scale-105'}`}
                style={{ WebkitTapHighlightColor: 'transparent' }}
              >
                {hasUnread && (
                  <span className="absolute top-2 right-2 bg-rose-500 text-white w-5 h-5 flex items-center justify-center rounded-full animate-bounce shadow-lg border-2 border-white z-50">
                    <i className="fa-solid fa-bell text-[9px]"></i>
                  </span>
                )}
                <div className="w-12 h-12 flex items-center justify-center shrink-0 relative z-10 pointer-events-none">
                  <i className="fa-solid fa-location-dot text-[20px] group-hover:scale-110 transition-transform duration-500 drop-shadow-md"></i>
                </div>
                <div className="max-w-0 overflow-hidden opacity-0 group-hover:max-w-[220px] group-hover:opacity-100 transition-all duration-500 ease-in-out flex items-center whitespace-nowrap relative z-10 pointer-events-none">
                  <span className="font-black text-[11px] sm:text-xs uppercase tracking-[0.2em] pr-2 drop-shadow-md">
                    Validar Factibilidad
                  </span>
                </div>
              </button>
            )}

            {/* ESTADO 2: VENTANA DEL CHAT */}
            {isOpen && (
              <div className="w-[calc(100vw-3rem)] sm:w-[380px] h-[550px] max-h-[85vh] bg-white/85 backdrop-blur-2xl rounded-[2rem] shadow-[0_25px_50px_-12px_rgba(178,51,255,0.25)] flex flex-col overflow-hidden z-50 border border-white/60 animate-slide-up">
                
                {/* CABECERA (ZONA DE ARRASTRE) */}
                <div 
                  className="drag-handle bg-gradient-to-r from-slate-900 to-slate-800 p-6 flex justify-between items-center relative shrink-0 shadow-md z-10 cursor-move select-none"
                  onMouseDown={handleDragStart}
                  onTouchStart={handleDragStart}
                >
                  <div className="flex items-center gap-4 pointer-events-none">
                    <div className="w-10 h-10 bg-gradient-to-br from-[#b233ff] to-[#ff4df8] rounded-2xl flex items-center justify-center text-white shadow-lg shadow-purple-500/30">
                      <i className="fa-solid fa-location-dot text-lg"></i>
                    </div>
                    <div>
                      <h3 className="font-black text-white text-base uppercase tracking-tight italic drop-shadow-sm">Terminal BOT</h3>
                      <p className="text-slate-300 text-[9px] font-bold uppercase tracking-[0.15em] mt-0.5 opacity-80">Sistema de Factibilidad</p>
                    </div>
                  </div>
                  <button onClick={toggleOpen} className="text-white/50 hover:text-white hover:bg-white/10 hover:rotate-90 w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300">
                    <i className="fa-solid fa-xmark text-xl pointer-events-none"></i>
                  </button>
                </div>

                {!isRegistered ? (
                  <div className="flex-1 p-10 bg-transparent flex flex-col justify-center items-center text-center relative">
                    <div className="absolute inset-0 bg-gradient-to-b from-transparent to-purple-50/30 -z-10"></div>
                    <div className="w-24 h-24 bg-white/80 backdrop-blur-sm border border-white shadow-[0_15px_35px_-5px_rgba(178,51,255,0.15)] text-[#b233ff] rounded-[2.5rem] flex items-center justify-center mb-8 shrink-0 transition-transform duration-700 hover:scale-105">
                      <i className="fa-solid fa-fingerprint text-5xl opacity-80"></i>
                    </div>
                    <h4 className="text-2xl font-black text-slate-800 mb-2 uppercase tracking-tight">Acceso Requerido</h4>
                    <p className="text-xs text-slate-500 mb-8 font-medium leading-relaxed px-4">Por favor, identifícate para iniciar el escaneo de factibilidad técnica.</p>
                    <input 
                      type="text" 
                      placeholder="Tu nombre completo" 
                      value={clientName} 
                      onChange={(e) => setClientName(e.target.value)} 
                      onKeyDown={(e) => { if(e.key === 'Enter') handleRegister(); }} 
                      className="w-full bg-white/80 backdrop-blur-sm border border-white/60 shadow-inner rounded-2xl px-6 py-4 text-sm mb-4 outline-none focus:ring-2 focus:ring-[#b233ff]/40 focus:bg-white transition-all font-semibold" 
                    />
                    <button 
                      onClick={handleRegister} 
                      className="w-full bg-gradient-to-r from-[#b233ff] to-[#ff4df8] text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-[0_10px_20px_-5px_rgba(178,51,255,0.4)] hover:shadow-[0_15px_25px_-5px_rgba(178,51,255,0.6)] active:scale-95 transition-all duration-300"
                    >
                      Inicializar Escaneo
                    </button>
                  </div>
                ) : (
                  <>
                    <div className="flex-1 overflow-y-auto p-6 bg-slate-50/40 flex flex-col gap-6 relative">
                      <div className="absolute inset-0 bg-gradient-to-b from-purple-50/20 to-transparent pointer-events-none"></div>
                      <div className="flex flex-col items-start relative z-10">
                        <div className="px-5 py-4 rounded-3xl rounded-tl-sm bg-white/90 backdrop-blur-md border border-white shadow-sm text-slate-700 text-sm">
                          <p className="font-black text-[10px] text-transparent bg-clip-text bg-gradient-to-r from-[#b233ff] to-[#ff4df8] uppercase tracking-widest border-b border-slate-100 pb-2 mb-3">CONEXIÓN ESTABLECIDA</p>
                          <p className="font-bold text-slate-900 mb-1">HOLA, {clientName.toUpperCase()}</p>
                          <p className="text-slate-500 leading-relaxed">Envía la dirección para validar la cobertura de fibra óptica e infraestructura.</p>
                        </div>
                      </div>

                      {myMessages.map((msg) => {
                        const isMe = msg.sender === 'client';
                        const isSystem = msg.senderName === 'SISTEMA';
                        if (isSystem) return (
                          <div key={msg.id} className="flex justify-center my-2 relative z-10">
                            <div className="bg-slate-900/90 backdrop-blur-sm text-emerald-400 font-mono text-[9px] px-4 py-2.5 rounded-full border border-slate-700/50 text-center uppercase tracking-[0.1em] shadow-[0_5px_15px_-5px_rgba(0,0,0,0.3)]">
                              {msg.text}
                            </div>
                          </div>
                        );
                        return (
                          <div key={msg.id} className={`flex flex-col max-w-[85%] relative z-10 ${isMe ? 'self-end items-end' : 'self-start items-start'}`}>
                            <div className={`px-5 py-3.5 rounded-3xl text-[13px] font-medium leading-relaxed shadow-sm ${isMe ? 'bg-gradient-to-r from-[#b233ff] to-[#ff4df8] text-white rounded-br-sm shadow-[0_5px_15px_-5px_rgba(178,51,255,0.4)]' : 'bg-white/90 backdrop-blur-md border border-white text-slate-700 rounded-bl-sm'}`}>
                              {msg.text}
                            </div>
                          </div>
                        );
                      })}
                      <div ref={messagesEndRef} className="h-2" />
                    </div>
                    
                    <form onSubmit={handleSendMessage} className="p-4 bg-white/70 backdrop-blur-xl border-t border-white/60 flex gap-3 shrink-0 relative z-20 items-center">
                      <div className="relative flex-1 flex items-center bg-white/80 border border-white shadow-inner rounded-full focus-within:bg-white focus-within:ring-2 focus-within:ring-[#b233ff]/30 transition-all">
                        <button 
                          type="button" 
                          onClick={() => setShowEmojis(!showEmojis)} 
                          className={`pl-4 pr-2 transition-colors duration-300 ${showEmojis ? 'text-[#b233ff]' : 'text-slate-400 hover:text-[#b233ff]'}`}
                        >
                          <i className="fa-regular fa-face-smile text-lg"></i>
                        </button>

                        <input 
                          type="text" 
                          value={newMessage} 
                          onChange={(e) => setNewMessage(e.target.value)} 
                          placeholder="Escribe la dirección..." 
                          className="flex-1 bg-transparent py-4 pr-5 text-sm outline-none font-medium text-slate-700 w-full" 
                        />

                        {showEmojis && (
                          <div className="absolute bottom-[calc(100%+12px)] left-0 w-[240px] bg-white/95 backdrop-blur-3xl border border-white/60 shadow-[0_15px_35px_-5px_rgba(178,51,255,0.3)] rounded-3xl p-3 grid grid-cols-5 gap-1.5 z-50 animate-slide-up">
                            {emojis.map((emoji) => (
                              <button key={emoji} type="button" onClick={() => addEmoji(emoji)} className="text-xl hover:bg-[#b233ff]/10 rounded-xl p-1.5 transition-all hover:scale-125 active:scale-95 flex items-center justify-center">
                                {emoji}
                              </button>
                            ))}
                          </div>
                        )}
                      </div>

                      <button 
                        type="submit" 
                        disabled={!newMessage.trim()} 
                        className="bg-gradient-to-r from-[#b233ff] to-[#ff4df8] text-white w-12 h-12 flex items-center justify-center rounded-full hover:shadow-[0_8px_20px_-5px_rgba(178,51,255,0.5)] disabled:opacity-40 disabled:grayscale flex-shrink-0 shadow-md active:scale-95 transition-all duration-300"
                      >
                        <i className="fa-solid fa-paper-plane text-sm translate-x-[-1px] translate-y-[1px]"></i>
                      </button>
                    </form>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ===================================================================
    // 3. COORDINADOR DE DATOS
    // ===================================================================
    function App() {
      const [allMessages, setAllMessages] = useState([]);
      const [allChats, setAllChats] = useState([]);
      const [cannedResponses, setCannedResponses] = useState([]);

      useEffect(() => {
        let isMounted = true;
        const loadData = async () => {
          const [chatsRaw, msgsRaw, cannedRaw] = await Promise.all([ 
            api.get('getChats'), 
            api.get('getMessages'),
            api.get('getCannedResponses')
          ]);
          if (isMounted) {
            if(chatsRaw && Array.isArray(chatsRaw)) setAllChats(chatsRaw.map(c => ({ id: c.CHAT_ID, clientName: c.NOMBRE_CLIENTE, status: c.ESTADO, agentName: c.AGENTE_NOMBRE })));
            if(msgsRaw && Array.isArray(msgsRaw)) setAllMessages(msgsRaw.map(m => ({ id: m.MENSAJE_ID, conversationId: m.CHAT_ID, sender: m.ROL_EMISOR, text: m.TEXTO, timestamp: m.TIMESTAMP })));
            if(cannedRaw && Array.isArray(cannedRaw)) setCannedResponses(cannedRaw.map(r => ({ id: r.ID_RESPUESTA, title: r.TITULO, text: r.TEXTO })));
          }
        };
        loadData(); const interval = setInterval(loadData, 4000); return () => { isMounted = false; clearInterval(interval); };
      }, []);

      return <ClientWebsite allMessages={allMessages} allChats={allChats} cannedResponses={cannedResponses} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
